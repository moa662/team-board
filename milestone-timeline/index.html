<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的项目进度</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e5f1;
            --text-dim: #8b8da3;
            --text-muted: #5c5e72;
            --accent: #818cf8;
            --warning: #fbbf24;
            --danger: #f43f5e;
            --success: #10b981;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px 80px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header { margin-bottom: 32px; }
        .header h1 { font-size: 28px; font-weight: 800; }
        .header-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
        .view-switch {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .view-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 150ms ease;
        }
        .view-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .view-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* ========== 状态筛选栏 ========== */
        .filter-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .filter-tag {
            font-size: 12px; font-weight: 600; color: var(--text-dim);
            background: var(--bg); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 20px; cursor: pointer;
            transition: all 150ms ease;
        }
        .filter-tag:hover { border-color: var(--accent); color: var(--accent); }
        .filter-tag.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .filter-tag.high.active { background: var(--danger); border-color: var(--danger); }
        .filter-tag.progress.active { background: var(--success); border-color: var(--success); }
        .filter-tag.exploring.active { background: var(--warning); border-color: var(--warning); color: #1a1d27; }
        .filter-clear { font-size: 12px; color: var(--text-muted); cursor: pointer; margin-left: auto; font-weight: 600; }
        .filter-clear:hover { color: var(--accent); }

        /* ========== 搜索框 ========== */
        .search-box {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 20px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 150ms ease;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }
        .filter-status {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            padding: 10px 16px;
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        .filter-status .filter-tag {
            background: rgba(129, 140, 248, 0.15);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .filter-status .filter-tag.count {
            background: var(--bg);
            color: var(--text-muted);
            font-weight: 400;
        }
        .filter-status .filter-clear {
            margin-left: auto;
            color: #ef4444;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
        }
        .filter-status .filter-clear:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ========== 项目卡片 ========== */
        .projects-list { display: flex; flex-direction: column; gap: 12px; }

        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: all 150ms ease;
            cursor: pointer;
            overflow: hidden;
        }
        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }
        .project-card.expanded {
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(129, 140, 248, 0.2);
        }
        .project-card.high-priority { border-left: 3px solid var(--danger); }
        .project-card.active { border-left: 3px solid var(--accent); }
        .project-card.progress { border-left: 3px solid var(--success); }
        .project-card.exploring { border-left: 3px solid var(--warning); }
        .project-card.archived { border-left: 3px solid var(--text-muted); opacity: 0.7; }
        /* 今天有活跃记录的项目发光效果 */
        .project-card.today-active {
            box-shadow: 0 0 0 1px var(--success), 0 4px 20px rgba(16, 185, 129, 0.15);
            animation: project-pulse 2s ease-in-out infinite;
        }
        @keyframes project-pulse {
            0%, 100% { box-shadow: 0 0 0 1px var(--success), 0 4px 20px rgba(16, 185, 129, 0.15); }
            50% { box-shadow: 0 0 0 2px var(--success), 0 4px 25px rgba(16, 185, 129, 0.25); }
        }

        /* 卡片主体（不包含抽屉） */
        .project-card-main { padding: 18px 20px; }

        .project-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px;
        }
        .project-icon { font-size: 22px; }
        .project-name { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
        .project-progress {
            width: 40px; height: 40px; border-radius: 50%;
            background: conic-gradient(var(--accent) var(--pct), var(--border) 0);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; color: var(--text);
            flex-shrink: 0;
        }
        .project-progress-inner {
            width: 32px; height: 32px; border-radius: 50%; background: var(--surface);
            display: flex; align-items: center; justify-content: center;
        }
        .project-card.high-priority .project-progress {
            background: conic-gradient(var(--danger) var(--pct), var(--border) 0);
        }
        .match-badge {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .activity-count-badge {
            background: var(--surface);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid var(--border);
        }
        .last-activity.stale {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .todo-badge {
            background: rgba(251, 191, 36, 0.15);
            color: #f59e0b;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .stale-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .project-metrics {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .metric-item {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .metric-item.todo {
            background: rgba(251, 191, 36, 0.1);
            border-color: rgba(251, 191, 36, 0.2);
            color: #f59e0b;
        }
        .metric-icon {
            margin-right: 2px;
        }
        .project-features {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .feature-tag {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--surface);
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .feature-tag.more {
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent);
            border-color: rgba(129, 140, 248, 0.2);
        }

        /* 项目进度条 */
        .project-progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .project-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .high-priority .project-progress-fill {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        .progress .project-progress-fill {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        /* ========== 列表操作栏 ========== */
        .list-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .list-count {
            font-size: 11px; color: var(--text-muted);
            font-weight: 600;
        }
        .action-btn {
            font-size: 11px; color: var(--accent);
            cursor: pointer; font-weight: 600;
            padding: 4px 10px; border-radius: 12px;
            background: rgba(129, 140, 248, 0.1);
            transition: all 0.15s ease;
        }
        .action-btn:hover {
            background: rgba(129, 140, 248, 0.2);
        }
        .action-group {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        /* 快速筛选栏 */
        .quick-filters {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .quick-filter-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .quick-filter-btn {
            font-size: 11px;
            color: var(--text);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.15s ease;
        }
        .quick-filter-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 时间线视图样式 */
        .timeline-view {
            margin-bottom: 24px;
        }
        .timeline-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .timeline-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        .timeline-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-bottom: 8px;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .timeline-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .timeline-date {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .timeline-content {
            font-size: 13px;
            color: var(--text);
            margin-top: 4px;
        }
        .timeline-project {
            font-size: 11px;
            color: var(--accent);
            margin-top: 4px;
            font-weight: 600;
        }
        .timeline-tags {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        .timeline-tag {
            font-size: 9px;
            background: var(--bg);
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 6px;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .empty-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .project-card.progress .project-progress {
            background: conic-gradient(var(--success) var(--pct), var(--border) 0);
        }
        .project-progress {
            transition: all 0.3s ease;
        }
        .project-card:hover .project-progress {
            transform: scale(1.1);
        }
        .project-card.pinned {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.15);
        }
        .pin-btn {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.15s ease;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .pin-btn:hover {
            opacity: 1;
            background: rgba(139, 92, 246, 0.15);
        }
        .project-card.pinned .pin-btn {
            opacity: 1;
        }
        .pinned-badge {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid rgba(139, 92, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .focus-btn {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.15s ease;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .focus-btn:hover {
            opacity: 1;
            background: rgba(6, 182, 212, 0.15);
        }
        .project-card.focused {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
            transform: scale(1.01);
        }
        .focus-banner {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(6, 182, 212, 0.05));
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .focus-banner-title {
            font-size: 14px;
            font-weight: 700;
            color: #06b6d4;
        }
        .focus-stats {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 12px;
        }
        .focus-exit {
            margin-left: auto;
            background: rgba(6, 182, 212, 0.15);
            color: #06b6d4;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .focus-exit:hover {
            background: rgba(6, 182, 212, 0.25);
        }
        .activity-date-group {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            padding: 8px 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px dashed var(--border);
            margin-bottom: 8px;
        }

        .project-desc {
            font-size: 12px; color: var(--text-dim);
            line-height: 1.5; margin-bottom: 12px;
        }
        .latest-activity-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(129, 140, 248, 0.05);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            font-size: 11px;
            border-left: 2px solid var(--accent);
        }
        .latest-icon { opacity: 0.7; }
        .latest-text {
            flex: 1;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .latest-date {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* ========== 下一步行动 - 最核心视觉 ========== */
        .project-next {
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.15), rgba(129, 140, 248, 0.05));
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
        }
        .project-next-label {
            font-size: 10px; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 4px; opacity: 0.8;
        }
        .project-next-text {
            font-size: 14px; font-weight: 700; color: var(--accent);
            line-height: 1.4;
        }
        .project-card.high-priority .project-next {
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.15), rgba(244, 63, 94, 0.05));
            border-color: rgba(244, 63, 94, 0.2);
        }
        .project-card.high-priority .project-next-label,
        .project-card.high-priority .project-next-text {
            color: var(--danger);
        }
        .quick-log-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px dashed rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            transition: all 150ms ease;
        }
        .quick-log-bar:hover {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.5);
        }
        .quick-log-icon {
            font-size: 14px;
        }
        .quick-log-text {
            font-size: 12px;
            color: #10b981;
            font-weight: 600;
        }
        .project-card.high-priority .quick-log-bar {
            background: rgba(244, 63, 94, 0.08);
            border-color: rgba(244, 63, 94, 0.3);
        }
        .project-card.high-priority .quick-log-bar:hover {
            background: rgba(244, 63, 94, 0.15);
            border-color: rgba(244, 63, 94, 0.5);
        }
        .project-card.high-priority .quick-log-text {
            color: var(--danger);
        }

        /* ========== 活动抽屉 ========== */
        .project-activity-drawer {
            max-height: 0; overflow: hidden;
            transition: max-height 300ms ease;
            background: rgba(0, 0, 0, 0.2);
            border-top: 0 solid var(--border);
        }
        .project-card.expanded .project-activity-drawer {
            max-height: 600px;
            border-top: 1px solid var(--border);
        }

        .activity-header {
            padding: 14px 20px 10px;
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .activity-count {
            background: var(--surface); padding: 2px 8px; border-radius: 10px;
            font-size: 10px;
        }
        .activity-filter {
            background: rgba(251, 191, 36, 0.15);
            color: #f59e0b;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .activity-list {
            padding: 0 20px 16px;
            display: flex; flex-direction: column; gap: 6px;
            max-height: 400px; overflow-y: auto;
        }
        .activity-list::-webkit-scrollbar { width: 4px; }
        .activity-list::-webkit-scrollbar-track { background: transparent; }
        .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .activity-item {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 10px 12px;
            transition: all 150ms ease;
        }
        .activity-item:hover { border-color: var(--accent); }
        .activity-item.personal { border-left: 2px solid var(--accent); }
        .activity-item.work { border-left: 2px solid var(--success); }
        .activity-item.todo {
            border-left: 2px solid var(--warning);
            background: rgba(251, 191, 36, 0.05);
            position: relative;
        }
        .activity-item.todo::before {
            content: '📋';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.5;
        }
        .activity-item.matched {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
        }
        .activity-item.manual-match {
            border-left: 3px solid #8b5cf6;
            background: rgba(139, 92, 246, 0.05);
        }
        .activity-tag.matched-keyword {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .activity-tag.manual-tag {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
            font-weight: 600;
            border: 1px solid rgba(139, 92, 246, 0.3);
            cursor: pointer;
        }
        .activity-tag.manual-tag:hover {
            background: rgba(139, 92, 246, 0.25);
        }
        .assign-buttons {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }
        .assign-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            cursor: pointer;
        }
        .assign-select:hover {
            border-color: var(--accent);
        }
        .assign-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .assign-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        .quick-match-btn {
            background: rgba(129, 140, 248, 0.15);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(129, 140, 248, 0.3);
            white-space: nowrap;
            transition: all 150ms ease;
        }
        .quick-match-btn:hover {
            background: rgba(129, 140, 248, 0.3);
        }

        .activity-time {
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            margin-bottom: 4px;
        }
        .activity-title {
            font-size: 12px; font-weight: 600; color: var(--text);
            line-height: 1.4;
        }
        .activity-content {
            font-size: 11px; color: var(--text-dim);
            line-height: 1.5; margin-top: 4px; padding-top: 4px;
            border-top: 1px dashed var(--border);
        }
        .activity-tags {
            display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px;
        }
        .activity-tag {
            font-size: 9px; font-weight: 600; color: var(--text-muted);
            background: var(--surface); padding: 1px 6px; border-radius: 4px;
        }

        .no-activity {
            padding: 20px; text-align: center;
            font-size: 12px; color: var(--text-muted); font-style: italic;
        }

        /* ========== 展开指示器 ========== */
        .expand-indicator {
            text-align: center; padding-top: 8px; margin-top: 8px;
            border-top: 1px dashed var(--border);
            font-size: 10px; color: var(--text-muted);
            transition: all 150ms ease;
        }
        .project-card:hover .expand-indicator { color: var(--accent); }
        .expand-icon { display: inline-block; transition: transform 200ms ease; }
        .project-card.expanded .expand-icon { transform: rotate(180deg); }

        /* ========== 统计概览卡片 ========== */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        /* ========== 今日概览 ========== */
        .today-overview {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .today-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .today-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        .today-count {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(129, 140, 248, 0.15);
            padding: 2px 10px;
            border-radius: 10px;
        }
        .today-empty {
            text-align: center;
            padding: 24px 16px;
        }
        .empty-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .empty-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .empty-hint {
            font-size: 12px;
            color: var(--text-muted);
        }
        .today-entries {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .today-entry {
            display: flex;
            gap: 12px;
            padding: 10px 12px;
            background: rgba(129, 140, 248, 0.08);
            border: 1px solid rgba(129, 140, 248, 0.15);
            border-radius: 8px;
            cursor: pointer;
            transition: all 150ms ease;
        }
        .today-entry:hover {
            background: rgba(129, 140, 248, 0.15);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateX(4px);
        }
        .today-entry-time {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            padding-top: 1px;
        }
        .today-entry-content {
            flex: 1;
            min-width: 0;
        }
        .today-entry-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            margin-bottom: 3px;
        }
        .today-entry-project {
            font-size: 11px;
            color: var(--text-muted);
        }
        .today-more {
            font-size: 11px;
            color: var(--accent);
            text-align: center;
            padding: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .today-more:hover {
            text-decoration: underline;
        }
        .today-projects {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .today-projects-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .today-project-tag {
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(129, 140, 248, 0.1);
            transition: all 150ms ease;
        }
        .today-project-tag:hover {
            background: rgba(129, 140, 248, 0.2);
            transform: scale(1.1);
        }

        /* ========== 本周热力图 ========== */
        .weekly-heatmap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .heatmap-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .heatmap-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        .heatmap-total {
            font-size: 11px;
            font-weight: 600;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
            padding: 2px 10px;
            border-radius: 10px;
        }
        .heatmap-bars {
            display: flex;
            gap: 8px;
            height: 80px;
            align-items: flex-end;
        }
        .heatmap-day {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .heatmap-bar-wrap {
            height: 50px;
            width: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .heatmap-bar {
            width: 18px;
            border-radius: 4px 4px 2px 2px;
            transition: all 150ms ease;
        }
        .heatmap-bar:hover {
            transform: scaleY(1.1);
            transform-origin: bottom;
        }
        .heatmap-bar.level-0 { background: rgba(148, 163, 184, 0.15); }
        .heatmap-bar.level-1 { background: rgba(129, 140, 248, 0.3); }
        .heatmap-bar.level-2 { background: rgba(129, 140, 248, 0.5); }
        .heatmap-bar.level-3 { background: rgba(129, 140, 248, 0.7); }
        .heatmap-bar.level-4 { background: var(--accent); }
        .heatmap-bar.today {
            box-shadow: 0 0 0 2px #f59e0b;
        }
        .heatmap-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .heatmap-count {
            font-size: 9px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            transition: all 150ms ease;
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-value {
            font-size: 28px; font-weight: 800;
            color: var(--accent); margin-bottom: 4px;
        }
        .stat-card.high .stat-value { color: #ef4444; }
        .stat-card.active .stat-value { color: #818cf8; }
        .stat-card.progress .stat-value { color: #10b981; }
        .stat-card.exploring .stat-value { color: #f59e0b; }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }

        /* ========== 进度分布可视化 ========== */
        .progress-distribution {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .pd-label {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            margin-bottom: 12px;
        }
        .pd-bars {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 50px;
        }
        .pd-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }
        .pd-bar {
            width: 100%;
            background: var(--border);
            border-radius: 3px;
            transition: all 0.2s ease;
            min-height: 3px;
        }
        .pd-bar:hover {
            filter: brightness(1.2);
        }
        .pd-bar.hot {
            background: linear-gradient(180deg, #10b981, #059669);
        }
        .pd-bar-label {
            font-size: 9px; color: var(--text-muted);
            margin-top: 4px;
        }

        /* ========== 当前目标与里程碑 ========== */
        .goal-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .goal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .goal-icon { font-size: 24px; }
        .goal-title { flex: 1; font-size: 16px; font-weight: 700; color: var(--text); }
        .goal-progress { font-size: 18px; font-weight: 800; }
        .goal-focus {
            font-size: 12px; color: var(--text-dim);
            margin-bottom: 12px;
        }
        .goal-progress-bar {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .goal-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .milestones-timeline {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .milestone-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            position: relative;
        }
        .milestone-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
            margin-top: 4px;
            z-index: 1;
        }
        .milestone-dot.completed { background: #10b981; }
        .milestone-dot.current {
            background: #818cf8;
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.2);
        }
        .milestone-content { flex: 1; padding-bottom: 16px; }
        .milestone-title {
            font-size: 13px; font-weight: 600; color: var(--text);
        }
        .milestone-meta {
            font-size: 11px; color: var(--text-muted);
            margin-top: 2px;
        }
        .milestone-line {
            position: absolute;
            left: 5px;
            top: 16px;
            width: 2px;
            height: calc(100% - 12px);
            background: var(--border);
        }
        .milestone-line.completed { background: #10b981; }

        /* ========== 回到顶部 ========== */
        .back-to-top {
            position: fixed; bottom: 20px; right: 20px;
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--accent); color: #fff; border: none;
            cursor: pointer; font-size: 16px; font-weight: 700;
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.4);
            transition: all 150ms ease; opacity: 0.9;
        }
        .back-to-top:hover { opacity: 1; transform: translateY(-2px); }

        /* 快捷操作悬浮按钮 */
        .quick-actions {
            position: fixed;
            bottom: 80px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 99;
        }
        .quick-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 150ms ease;
            opacity: 0.8;
        }
        .quick-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* ========== 弹窗样式 ========== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 500px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.2s ease;
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        .modal-close {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 20px;
            padding: 4px 8px;
        }
        .modal-close:hover {
            color: var(--text);
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--accent);
        }
        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            padding: 8px 12px;
            background: rgba(129, 140, 248, 0.1);
            border-radius: 8px;
            margin-top: 8px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s ease;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--text-muted);
        }
        .btn-secondary.danger {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
            margin-right: auto;
        }
        .btn-secondary.danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }
        .ignored-chip {
            display: inline-block;
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(140, 143, 153, 0.15);
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .ignored-chip:hover {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        /* 搜索结果高亮 */
        .search-highlight {
            background: rgba(251, 191, 36, 0.3);
            padding: 1px 4px;
            border-radius: 3px;
        }

        /* ========== 今日推荐 ========== */
        .today-section {
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.1), rgba(129, 140, 248, 0.02));
            border: 1px solid rgba(129, 140, 248, 0.2);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 24px;
        }
        .today-header {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; font-weight: 700; color: var(--accent);
            margin-bottom: 16px;
        }
        .today-list { display: flex; flex-direction: column; gap: 10px; }
        .today-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 16px;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
            transition: all 150ms ease;
        }
        .today-item:hover { border-color: var(--accent); }
        .today-icon { font-size: 18px; }
        .today-name { flex: 1; font-size: 13px; font-weight: 600; }
        .today-next {
            font-size: 11px; color: var(--text-dim);
            max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .today-priority {
            padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
            background: var(--danger); color: #fff;
        }

        /* ========== 最近活动时间线 ========== */
        .recent-activity-section { margin-bottom: 24px; }
        .recent-activity-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .recent-activity-title { font-size: 14px; font-weight: 700; }
        .recent-activity-view-all {
            font-size: 11px; color: var(--text-muted); cursor: pointer;
            transition: color 150ms ease;
        }
        .recent-activity-view-all:hover { color: var(--accent); }

        .mini-timeline {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 16px 20px;
        }
        .mini-timeline-item {
            display: flex; gap: 12px; padding: 8px 0;
            border-bottom: 1px dashed var(--border);
        }
        .mini-timeline-item:last-child { border-bottom: none; }
        .mini-timeline-time {
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            min-width: 75px; padding-top: 2px;
        }
        .mini-timeline-content { flex: 1; }
        .mini-timeline-title { font-size: 12px; font-weight: 600; }
        .mini-timeline-project {
            font-size: 10px; color: var(--accent); margin-top: 2px; font-weight: 600;
        }

        /* ========== 项目最后活动时间 ========== */
        .last-activity {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; color: var(--text-muted);
            padding: 2px 6px; background: var(--bg); border-radius: 6px;
        }
        .last-activity.recent { color: var(--success); }
        .last-activity.dot::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: currentColor;
        }

        /* ========== 未分类日志卡片 ========== */
        .unclassified-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 16px 20px;
            margin-bottom: 20px;
        }
        .unclassified-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .unclassified-title { font-size: 13px; font-weight: 700; color: var(--warning); }
        .unclassified-count {
            padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
            background: rgba(251, 191, 36, 0.2); color: var(--warning);
        }
        .unclassified-toggle {
            font-size: 11px; color: var(--text-muted); cursor: pointer;
            transition: color 150ms ease;
        }
        .unclassified-toggle:hover { color: var(--accent); }
        .data-btn {
            background: rgba(129, 140, 248, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(129, 140, 248, 0.2);
            transition: all 0.15s ease;
        }
        .data-btn:hover {
            background: rgba(129, 140, 248, 0.2);
        }
        .data-btn.danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }
        .data-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .footer { text-align: center; margin-top: 48px; font-size: 11px; color: var(--text-muted); }

        /* ========== 响应式优化 ========== */
        @media (max-width: 768px) {
            body { padding: 16px 12px; }
            .stats-overview { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 12px; }
            .stat-value { font-size: 22px; }
            .today-entry { flex-wrap: wrap; gap: 6px; }
            .today-entry-time { padding-top: 0; }
            .today-item { flex-wrap: wrap; gap: 6px; }
            .heatmap-bars { gap: 4px; height: 60px; }
            .heatmap-bar { width: 14px; }
            .today-next { flex-basis: 100%; font-size: 11px; opacity: 0.8; }
            .filter-bar { gap: 8px; }
            .filter-label { display: none; }
            .project-header { gap: 6px; }
            .project-name { font-size: 13px; }
            .project-progress { width: 32px; height: 32px; font-size: 9px; }
            .project-next-text { font-size: 12px; }
            .mini-timeline-item { flex-direction: column; align-items: flex-start; gap: 2px; }
            .mini-timeline-time { font-size: 9px; opacity: 0.7; }
            /* 时间流视图移动端优化 */
            .view-switch { flex-wrap: wrap; }
            .view-btn { flex: 1; min-width: 100px; padding: 10px 12px; }

        let manualMatches = JSON.parse(localStorage.getItem('manualMatches') || '{}');
        // 忽略的日志（不分配给任何项目）
        let ignoredEntries = JSON.parse(localStorage.getItem('ignoredEntries') || '[]');
        window.expandAllMode = false;

        // ========== 条目类型判断 ==========
        function isPersonalEntry(tags) {
            return tags.some(t => t.includes('开发') || t.includes('AI') || t.includes('时间轴') || t.includes('知识库') || t.includes('思考') || t.includes('灵感') || t.includes('Obsidian'));
        }
        function isWorkEntry(tags) {
            return tags.some(t => t.includes('商业') || t.includes('运营') || t.includes('产品') || t.includes('公司') || t.includes('短视频') || t.includes('税务') || t.includes('门店'));
        }
        function isTodoEntry(tags) {
            return tags.some(t => t.includes('待办') || t.includes('代办') || t.includes('需求代办'));
        }

        // 项目特定关键词配置
        const projectSpecificKeywords = {
            'milestone-timeline': ['时间轴系统', '进度记忆器', '里程碑', '项目卡片', '时间流向', '时间轴项目', '原型', '需求文档', '竞品参考', '方向'],
            'my-wiki': ['知识库', 'Obsidian', 'AI链接笔记', 'wiki-sync', '增量同步', '笔记云同步', '我的知识库', 'NotebookLM', '知识管理'],
            'data-toolkit': ['数据工具箱', '数据清洗', '数据看板', '会员数据', '普拉提门店', '数据流水线', '数据分析'],
            'skill-ecosystem': ['Skill 生态', '自动更新看板', 'xiaona', 'remotion-motion', 'skill-hub', 'Skill开发', 'defuddle'],
            'short-video-kb': ['短视频运营', '短视频知识库', '抖音', '小红书', '视频脚本', '短视频', '视频链接', 'B端'],
            'fitness-coach-pwa': ['健身教练', '健身PWA', '普拉提行业', '课程管理', '健身教练PWA', '普拉提'],
            'ai-image-gen': ['生图工具', '图片生成', 'Ideogram', 'Seed', '视频封面', 'AI生图'],
            'team-board': ['团队协作', '团队看板', '任务管理', '团队协作看板'],
            '5a-marketing': ['5A营销', '营销系统', '转化漏斗', '用户旅程', '5A'],
            'api-toolkit': ['API工具箱', '火山引擎', '用量查询'],
            'remotion-demo': ['Remotion', '视频生成'],
            'project-board': ['我的总看板', '进度总览'],
        };

        // ========== 原始的项目 - 日志匹配函数（会被 render 函数中的全局去重逻辑覆盖） ==========
        function getEntriesForProject(project, allEntries) {
            const manualMatched = allEntries.filter(e => manualMatches[e.id] === project.id);
            manualMatched.forEach(e => e._matchedKeywords = ['✋ 手动匹配']);

            const keywords = projectSpecificKeywords[project.id] || [];
            const autoMatched = allEntries.filter(entry => {
                if (manualMatches[entry.id] || ignoredEntries.includes(entry.id)) return false;
                const searchText = (entry.title + ' ' + (entry.content || '') + ' ' + (entry.tags || []).join(' ')).toLowerCase();
                const matchedKeywords = keywords.filter(kw => {
                    const kwLower = kw.toLowerCase().trim();
                    return kwLower.length >= 2 && searchText.includes(kwLower);
                });
                if (matchedKeywords.length > 0) {
                    entry._matchedKeywords = matchedKeywords;
                    return true;
                }
                return false;
            });

            return [...manualMatched, ...autoMatched].sort((a, b) => {
                const dateA = new Date(a.date + ' ' + (a.time || '00:00'));
                const dateB = new Date(b.date + ' ' + (b.time || '00:00'));
                return dateB - dateA;
            });
        }

        // ========== 获取未分类日志 ==========
        function getUnclassifiedEntries(projects, allEntries) {
            const classifiedIds = new Set();
            const projectMatchCount = {};
            projects.forEach(p => {
                const entries = getEntriesForProject(p, allEntries);
                projectMatchCount[p.id] = entries.length;
                entries.forEach(e => classifiedIds.add(e.id));
            });
            const unclassified = allEntries.filter(e => !classifiedIds.has(e.id) && !ignoredEntries.includes(e.id))
                .sort((a, b) => new Date(b.date + ' ' + (b.time || '00:00')) - new Date(a.date + ' ' + (a.time || '00:00')));
            // 调试信息（生产环境可注释）
            // console.log(`📊 项目日志匹配统计:`);
            // projects.forEach(p => console.log(`  ${p.name}: ${projectMatchCount[p.id]} 条`));
            // console.log(`❌ 未分类日志: ${unclassified.length}/${allEntries.length} 条`);
            // console.log(`🤷 已忽略日志: ${ignoredEntries.length} 条`);
            return unclassified;
        }

        // ========== 获取项目最后活动时间 ==========
        function getLastActivityDate(project, allEntries) {
            const entries = getEntriesForProject(project, allEntries);
            if (entries.length === 0) return null;
            return entries[0].date + ' ' + (entries[0].time || '00:00');
        }

        // ========== 判断是否最近活跃（3天内） ==========
        function isRecentlyActive(lastActivityStr) {
            if (!lastActivityStr) return false;
            const lastDate = new Date(lastActivityStr);
            const daysDiff = (Date.now() - lastDate) / (1000 * 60 * 60 * 24);
            return daysDiff <= 3;
        }

        // ========== 智能推荐今日应该推进的项目 ==========
        function getRecommendedProjects(projects, allEntries) {
            return projects
                .filter(p => p.priority === 'high' || p.status === 'active')
                .map(p => ({
                    ...p,
                    entries: getEntriesForProject(p, allEntries),
                    lastActivity: getLastActivityDate(p, allEntries)
                }))
                .sort((a, b) => {
                    // 高优且最近没活动的排在最前面
                    const aStale = a.priority === 'high' && !isRecentlyActive(a.lastActivity);
                    const bStale = b.priority === 'high' && !isRecentlyActive(b.lastActivity);
                    if (aStale && !bStale) return -1;
                    if (!aStale && bStale) return 1;
                    // 然后按优先级排序
                    const priorityOrder = { high: 0, medium: 1, low: 2 };
                    return (priorityOrder[a.priority] || 0) - (priorityOrder[b.priority] || 0);
                })
                .slice(0, 4); // 最多推荐4个
        }

        // ========== 渲染主函数 ==========
        function render() {
            if (!timelineData) return;
            const { projects, entries } = timelineData;

            // ====== 全局匹配与去重：同一条日志只显示在最匹配的项目下 ======
            // 1. 先收集每条日志的所有匹配项目
            const entryMatchMap = {};
            entries.forEach(entry => {
                if (manualMatches[entry.id] || ignoredEntries.includes(entry.id)) return;
                const matchedProjects = [];
                projects.forEach(p => {
                    const keywords = projectSpecificKeywords[p.id] || [];
                    const searchText = (entry.title + ' ' + (entry.content || '') + ' ' + (entry.tags || []).join(' ')).toLowerCase();
                    const matchedKeywords = keywords.filter(kw => searchText.includes(kw.toLowerCase()));
                    if (matchedKeywords.length > 0) {
                        matchedProjects.push({ project: p, keywords: matchedKeywords });
                    }
                });
                if (matchedProjects.length > 0) {
                    entryMatchMap[entry.id] = matchedProjects;
                }
            });

            // 2. 全局分配：同一条日志只分配给一个项目（关键词匹配数多的优先）
            const globalEntryAssignment = {}; // entryId -> projectId
            Object.entries(entryMatchMap).forEach(([entryId, matches]) => {
                // 按匹配关键词数量排序，选择最匹配的项目
                if (matches.length === 1) {
                    globalEntryAssignment[entryId] = matches[0].project.id;
                } else {
                    // 多重匹配：选择关键词匹配数量最多的项目
                    const bestMatch = matches.sort((a, b) => b.keywords.length - a.keywords.length)[0];
                    globalEntryAssignment[entryId] = bestMatch.project.id;
                }
            });

            // 3. 保存原始函数引用，重写 getEntriesForProject 使用全局分配结果
            const originalGetEntries = getEntriesForProject;
            getEntriesForProject = function(project, allEntries) {
                const manualMatched = allEntries.filter(e => manualMatches[e.id] === project.id);
                manualMatched.forEach(e => e._matchedKeywords = ['✋ 手动匹配']);

                const autoMatched = allEntries.filter(entry => {
                    if (manualMatches[entry.id] || ignoredEntries.includes(entry.id)) return false;
                    return globalEntryAssignment[entry.id] === project.id;
                });

                // 标记自动匹配的关键词（用于调试显示）
                autoMatched.forEach(entry => {
                    const keywords = projectSpecificKeywords[project.id] || [];
                    const searchText = (entry.title + ' ' + (entry.content || '') + ' ' + (entry.tags || []).join(' ')).toLowerCase();
                    entry._matchedKeywords = keywords.filter(kw => searchText.includes(kw.toLowerCase()));
                });

                return [...manualMatched, ...autoMatched].sort((a, b) => {
                    const dateA = new Date(a.date + ' ' + (a.time || '00:00'));
                    const dateB = new Date(b.date + ' ' + (b.time || '00:00'));
                    return dateB - dateA;
                });
            };

            // 计算各状态数量
            const statusCounts = {};
            const priorityCounts = {};
            projects.forEach(p => {
                statusCounts[p.status] = (statusCounts[p.status] || 0) + 1;
                priorityCounts[p.priority] = (priorityCounts[p.priority] || 0) + 1;
            });

            let html = '';

            // ====== 视图切换：全局时间流视图 ======
            if (currentView === 'timeline') {
                // 全局时间流：所有日志按时间倒序排列
                html += renderGlobalTimeline(entries, projects, globalEntryAssignment);
                document.getElementById('app').innerHTML = html;
                return;
            }

            // ====== 视图切换：项目视图（原有逻辑） ======
            // 0. 统计概览
            html += renderStatsOverview(projects, entries);

            // 0.05 今日概览
            html += renderTodayOverview(entries, projects);

            // 0.08 本周活动热力图
            html += renderWeeklyHeatmap(entries);

            // 0.1 项目进度分布可视化
            html += renderProgressDistribution(projects);

            // 0.2 当前目标与里程碑进度
            html += renderCurrentGoalAndMilestones(timelineData);

            // 0.3 专注模式提示
            if (focusProjectId) {
                const focusProject = projects.find(p => p.id === focusProjectId);
                if (focusProject) {
                    const focusEntries = getEntriesForProject(focusProject, entries);
                    html += '<div class="focus-banner" onclick="event.stopPropagation()">';
                    html += '<span class="focus-banner-title">🎯 专注模式: ' + esc(focusProject.name) + '</span>';
                    html += '<span class="focus-stats">进度: ' + focusProject.progress + '% · 日志: ' + focusEntries.length + ' 条</span>';
                    html += '<span class="focus-exit" onclick="toggleFocus(\'' + focusProjectId + '\', event)">退出专注</span>';
                    html += '</div>';
                }
            }

            // 0.5 搜索框
            html += renderSearchBox();

            // 1. 今日推荐
            const recommended = getRecommendedProjects(projects, entries);
            html += renderTodaySection(recommended);

            // 2. 最近活动时间线
            const recentEntries = [...entries]
                .sort((a, b) => new Date(b.date + ' ' + (b.time || '00:00')) - new Date(a.date + ' ' + (a.time || '00:00')))
                .slice(0, 8);
            html += renderRecentActivity(recentEntries, projects);

            // 3. 未分类日志提示
            const unclassified = getUnclassifiedEntries(projects, entries);
            if (unclassified.length > 0) {
                html += renderUnclassified(unclassified);
            }

            // 4. 筛选栏
            html += renderFilterBar(statusCounts, priorityCounts, projects);

            // 筛选项目
            let filtered = projects;
            if (activeProjectFilter) {
                if (activeProjectFilter.startsWith('priority:')) {
                    const priority = activeProjectFilter.replace('priority:', '');
                    filtered = projects.filter(p => p.priority === priority);
                } else if (activeProjectFilter.startsWith('progress:')) {
                    const range = activeProjectFilter.replace('progress:', '').split('-').map(Number);
                    filtered = projects.filter(p => p.progress > range[0] && p.progress <= range[1]);
                } else if (activeProjectFilter === 'hastodo') {
                    filtered = projects.filter(p => getEntriesForProject(p, entries).some(e => isTodoEntry(e.tags || [])));
                } else if (activeProjectFilter === 'stale') {
                    // 高优且超过7天没有活动
                    filtered = projects.filter(p => {
                        if (p.priority !== 'high') return false;
                        const lastActivity = getLastActivityDate(p, entries);
                        if (!lastActivity) return true; // 从未有活动的也算停滞
                        const days = Math.floor((new Date() - new Date(lastActivity)) / (1000 * 60 * 60 * 24));
                        return days > 7;
                    });
                } else if (activeProjectFilter === 'recent') {
                    // 最近3天有活动
                    filtered = projects.filter(p => {
                        const lastActivity = getLastActivityDate(p, entries);
                        if (!lastActivity) return false;
                        const days = Math.floor((new Date() - new Date(lastActivity)) / (1000 * 60 * 60 * 24));
                        return days <= 3;
                    });
                } else if (activeProjectFilter === 'pinned') {
                    filtered = projects.filter(p => pinnedProjects.includes(p.id));
                } else {
                    filtered = projects.filter(p => p.status === activeProjectFilter);
                }
            }

            // 专注模式 - 只显示专注的项目
            if (focusProjectId) {
                filtered = filtered.filter(p => p.id === focusProjectId);
            }

            // 搜索过滤 - 同时搜索项目信息和关联的活动日志
            let searchMatchedLogs = {};
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase().trim();
                filtered = filtered.filter(p => {
                    const nameMatch = p.name.toLowerCase().includes(q);
                    const descMatch = (p.description || '').toLowerCase().includes(q);
                    const nextMatch = (p.next || '').toLowerCase().includes(q);
                    const featMatch = (p.features || []).some(f => f.toLowerCase().includes(q));
                    // 同时搜索关联的活动日志
                    const matchedEntries = getEntriesForProject(p, entries).filter(e =>
                        (e.title || '').toLowerCase().includes(q) ||
                        (e.content || '').toLowerCase().includes(q) ||
                        (e.tags || []).some(t => t.toLowerCase().includes(q))
                    );
                    if (matchedEntries.length > 0) {
                        searchMatchedLogs[p.id] = matchedEntries.length;
                    }
                    return nameMatch || descMatch || nextMatch || featMatch || matchedEntries.length > 0;
                });
            }

            // 排序
            let sorted = [...filtered];
            // 置顶项目排最前
            sorted.sort((a, b) => {
                const aPinned = pinnedProjects.includes(a.id);
                const bPinned = pinnedProjects.includes(b.id);
                if (aPinned && !bPinned) return -1;
                if (!aPinned && bPinned) return 1;
                return 0;
            });
            // 然后按其他规则排序
            if (sortBy === 'progress') {
                sorted.sort((a, b) => {
                    const aPinned = pinnedProjects.includes(a.id);
                    const bPinned = pinnedProjects.includes(b.id);
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    return b.progress - a.progress;
                });
            } else if (sortBy === 'recent') {
                sorted.sort((a, b) => {
                    const aPinned = pinnedProjects.includes(a.id);
                    const bPinned = pinnedProjects.includes(b.id);
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    const aLast = getLastActivityDate(a, entries);
                    const bLast = getLastActivityDate(b, entries);
                    if (!aLast) return 1;
                    if (!bLast) return -1;
                    return new Date(bLast) - new Date(aLast);
                });
            } else {
                sorted.sort((a, b) => {
                    const aPinned = pinnedProjects.includes(a.id);
                    const bPinned = pinnedProjects.includes(b.id);
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    const priorityOrder = { high: 0, medium: 1, low: 2 };
                    const statusOrder = { active: 0, progress: 1, exploring: 2, archived: 3 };
                    return (priorityOrder[a.priority] || 0) - (priorityOrder[b.priority] || 0) ||
                           (statusOrder[a.status] || 0) - (statusOrder[b.status] || 0);
                });
            }

            // 筛选/搜索状态提示
            if (activeProjectFilter || searchQuery.trim()) {
                html += '<div class="filter-status">';
                if (activeProjectFilter) {
                    const filterNames = {
                        'priority:high': '🔴 高优先级',
                        'priority:medium': '🟡 中优先级',
                        'priority:low': '🟢 低优先级',
                        'active': '活跃项目',
                        'progress': '进行中',
                        'exploring': '探索中',
                        'archived': '已归档',
                        'progress:0-25': '刚启动 0-25%',
                        'progress:25-50': '进行中 25-50%',
                        'progress:50-75': '中后期 50-75%',
                        'progress:75-100': '即将完成 75-100%',
                        'hastodo': '📋 有待办事项',
                        'stale': '🔥 高优停滞项目',
                        'recent': '✨ 最近活跃',
                        'pinned': '📌 已置顶'
                    };
                    html += '<span class="filter-tag"><strong>' + (filterNames[activeProjectFilter] || activeProjectFilter) + '</strong></span>';
                }
                if (searchQuery.trim()) {
                    html += '<span class="filter-tag">🔍 "' + esc(searchQuery) + '"</span>';
                }
                html += '<span class="filter-tag count">找到 ' + sorted.length + ' 个项目</span>';
                html += '<span class="filter-clear" onclick="clearProjectFilter(); clearSearch();">✕ 清除所有</span>';
                html += '</div>';
            }

            // 快速智能筛选按钮
            html += '<div class="quick-filters">';
            html += '<span class="quick-filter-label">快速筛选:</span>';
            html += '<span class="quick-filter-btn" onclick="setProjectFilter(\'stale\')">🔥 停滞高优</span>';
            html += '<span class="quick-filter-btn" onclick="setProjectFilter(\'hastodo\')">📋 有待办</span>';
            html += '<span class="quick-filter-btn" onclick="setProjectFilter(\'recent\')">✨ 最近活跃</span>';
            html += '<span class="quick-filter-btn" onclick="setProjectFilter(\'pinned\')">📌 已置顶</span>';
            html += '</div>';

            // 最近活动时间线（默认折叠）
            if (showRecentActivity) {
                html += '<div class="timeline-view">';
                html += '<div class="timeline-header">';
                html += '<span class="timeline-title">📰 最近活动时间线</span>';
                html += '<span class="unclassified-toggle" onclick="showRecentActivity = false; render();">收起</span>';
                html += '</div>';

                // 按日期分组显示最近活动
                const recentEntries = [...entries]
                    .sort((a, b) => new Date(b.date + ' ' + (b.time || '00:00')) - new Date(a.date + ' ' + (a.time || '00:00')))
                    .slice(0, 20);

                let lastDate = null;
                recentEntries.forEach(entry => {
                    if (entry.date !== lastDate) {
                        html += '<div class="timeline-date">' + formatDate(entry.date) + '</div>';
                        lastDate = entry.date;
                    }

                    // 找到归属项目
                    let entryProject = null;
                    for (let p of projects) {
                        if (getEntriesForProject(p, entries).some(e => e.id === entry.id)) {
                            entryProject = p;
                            break;
                        }
                    }

                    const isTodo = isTodoEntry(entry.tags || []);
                    html += '<div class="timeline-item" onclick="' + (entryProject ? 'focusProjectId = \'' + entryProject.id + '\'; expandedProjectId = \'' + entryProject.id + '\'; render();' : '') + '">';
                    html += '<div class="timeline-date">' + (entry.time || '') + '</div>';
                    html += '<div class="timeline-content">' + (isTodo ? '📋 ' : '') + esc(entry.title) + '</div>';
                    if (entryProject) {
                        html += '<div class="timeline-project">' + entryProject.icon + ' ' + esc(entryProject.name) + '</div>';
                    }
                    if (entry.tags && entry.tags.length > 0) {
                        html += '<div class="timeline-tags">';
                        entry.tags.forEach(t => {
                            html += '<span class="timeline-tag">' + esc(t) + '</span>';
                        });
                        html += '</div>';
                    }
                    html += '</div>';
                });
                html += '</div>';
            } else {
                html += '<div class="timeline-header">';
                html += '<span class="timeline-title">📰 最近活动时间线</span>';
                html += '<span class="unclassified-toggle" onclick="showRecentActivity = true; render();">展开 (最近 20 条)</span>';
                html += '</div>';
            }

            // 视图切换与操作栏
            html += '<div class="list-actions">';
            html += '<span class="list-count">显示 ' + sorted.length + '/' + projects.length + ' 个项目 <span style="color: var(--text-muted);">· 快捷键: / 搜索, 1-5 筛选, E 展开, C 收起</span></span>';
            html += '<div class="action-group">';
            html += '<span class="action-btn" onclick="generateProjectReport()">📊 生成报告</span>';
            html += '<span class="action-btn" onclick="expandAll()">全部展开</span>';
            html += '<span class="action-btn" onclick="collapseAll()">全部收起</span>';
            html += '</div>';
            html += '</div>';

            // 渲染项目列表
            html += '<div class="projects-list">';
            if (sorted.length === 0) {
                html += '<div class="empty-state">';
                html += '<div class="empty-icon">🔍</div>';
                html += '<div class="empty-title">没有找到匹配的项目</div>';
                html += '<div class="empty-desc">尝试调整搜索词或清除筛选条件</div>';
                html += '<span class="action-btn" onclick="clearSearch(); clearProjectFilter();">清除筛选</span>';
                html += '</div>';
            } else {
                sorted.forEach(p => {
                    const projectEntries = getEntriesForProject(p, entries);
                    const matchedLogCount = searchMatchedLogs[p.id] || 0;
                    html += renderProjectCard(p, projectEntries, matchedLogCount);
                });
            }
            html += '</div>';

            document.getElementById('app').innerHTML = html;

            // 更新页脚最后更新时间
            const lastUpdateEl = document.getElementById('lastUpdate');
            if (lastUpdateEl && timelineData.meta && timelineData.meta.lastUpdated) {
                lastUpdateEl.textContent = formatDate(timelineData.meta.lastUpdated);
            }
        }

        // ========== 渲染统计概览 ==========
        function renderStatsOverview(projects, entries) {
            const statusCounts = { active: 0, progress: 0, exploring: 0, archived: 0 };
            projects.forEach(p => statusCounts[p.status]++);
            const highPriorityCount = projects.filter(p => p.priority === 'high').length;
            const avgProgress = projects.length > 0
                ? Math.round(projects.reduce((sum, p) => sum + p.progress, 0) / projects.length)
                : 0;

            // 计算本周活动数
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const thisWeekCount = entries.filter(e => new Date(e.date) >= weekAgo).length;

            let html = '<div class="stats-overview">';
            html += '<div class="stat-card"><div class="stat-value">' + projects.length + '</div><div class="stat-label">总项目数</div></div>';
