name: pilates-analyzer
description: 普拉提门店经营数据分析Skill - 自动导入数据、生成RFM会员分层、趋势分析、流失预警、可视化看板
version: 1.0.0
author: Claude Code
homepage: ""

entrypoint: python scripts/main.py

parameters:
  - name: action
    description: 执行操作类型
    type: string
    enum: [import, analyze, dashboard, full]
    default: full

  - name: month
    description: 分析月份 (YYYY-MM格式，如 2026-05)
    type: string
    default: ""

  - name: data_path
    description: Excel数据文件所在目录路径
    type: string
    default: ""

dependencies:
  python:
    - pandas>=2.0.0
    - numpy>=1.24.0
    - pyyaml>=6.0
    - openpyxl>=3.1.0

environment:
  PYTHONPATH: "${SKILL_DIR}/scripts:${PYTHONPATH}"
