<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普拉提门店经营分析看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 28px; }
        .subtitle { color: rgba(255,255,255,0.8); text-align: center; margin-bottom: 30px; }

        /* 门店切换器 */
        .store-switcher {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .store-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .store-btn:hover, .store-btn.active {
            background: white;
            color: #667eea;
        }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .kpi-label { color: #666; font-size: 14px; margin-bottom: 8px; }
        .kpi-value { font-size: 32px; font-weight: bold; color: #333; }
        .kpi-trend { font-size: 13px; margin-top: 5px; }
        .trend-up { color: #52c41a; }
        .trend-down { color: #ff4d4f; }

        .chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .chart-card {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .chart-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .chart-container { width: 100%; height: 300px; }

        .wide { grid-column: span 2; }

        .member-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .member-segment {
            padding: 15px; border-radius: 8px; text-align: center; color: white;
        }
        .segment-high { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .segment-active { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .segment-new { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .segment-sleep { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .segment-churn { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .segment-count { font-size: 28px; font-weight: bold; }
        .segment-label { font-size: 13px; opacity: 0.9; margin-top: 5px; }

        .top-members { max-height: 280px; overflow-y: auto; }
        .member-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .member-row:hover { background: #f5f5f5; }
        .member-name { font-weight: 500; }
        .member-stats { color: #666; font-size: 13px; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; color: white; }
        .badge-high { background: #ff4d4f; }
        .badge-active { background: #1890ff; }

        .store-coach-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .store-coach-card {
            background: #f8f9fa; border-radius: 8px; padding: 15px;
        }
        .store-coach-title {
            font-weight: bold; font-size: 16px; color: #667eea;
            margin-bottom: 10px; border-bottom: 2px solid #667eea; padding-bottom: 8px;
        }
        .store-coach-meta { font-size: 12px; color: #999; font-weight: normal; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ 普拉提门店经营分析看板</h1>
        <div class="subtitle">数据周期: 2026年2月 - 2026年4月 | 更新时间: <span id="generateTime"></span></div>

        <!-- 门店切换器 -->
        <div class="store-switcher" id="storeSwitcher">
            <button class="store-btn active" data-store="all">汇总</button>
        </div>

        <!-- KPI指标行 -->
        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">总耗课</div>
                <div class="kpi-value" id="totalLessons">0</div>
                <div class="kpi-trend">节（私教+热玛吉）</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">出勤人数</div>
                <div class="kpi-value" id="attendanceVolume">0</div>
                <div class="kpi-trend">人（耗课会员去重）</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">人效</div>
                <div class="kpi-value" id="humanEfficiency">0</div>
                <div class="kpi-trend">节/人</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">盈亏达成率</div>
                <div class="kpi-value" id="profitRate">0%</div>
                <div class="kpi-trend">销售金额/盈亏线</div>
            </div>
        </div>

        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">销售金额</div>
                <div class="kpi-value" id="salesAmount">0</div>
                <div class="kpi-trend">¥</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">销售达成率</div>
                <div class="kpi-value" id="salesRate">0%</div>
                <div class="kpi-trend">封顶150%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">续费转耗率</div>
                <div class="kpi-value" id="renewalRatio">0%</div>
                <div class="kpi-trend">续课量/总耗课</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">出勤率</div>
                <div class="kpi-value" id="activeRate">0%</div>
                <div class="kpi-trend">≥2次/在册会员</div>
            </div>
        </div>

        <div class="chart-grid">
            <!-- 耗课构成 -->
            <div class="chart-card">
                <div class="chart-title">📊 耗课构成</div>
                <div id="consumptionChart" class="chart-container"></div>
            </div>

            <!-- 门店耗课对比 -->
            <div class="chart-card">
                <div class="chart-title">🏪 各门店耗课对比</div>
                <div id="storeCompareChart" class="chart-container"></div>
            </div>

            <!-- 每日趋势 -->
            <div class="chart-card wide">
                <div class="chart-title">📈 每日耗课趋势</div>
                <div id="dailyTrendChart" class="chart-container"></div>
            </div>

            <!-- 星期分布 -->
            <div class="chart-card">
                <div class="chart-title">📅 每周各日耗课分布</div>
                <div id="weekdayChart" class="chart-container"></div>
            </div>

            <!-- 时段分布 -->
            <div class="chart-card">
                <div class="chart-title">⏰ 各时段耗课分布</div>
                <div id="timeSlotChart" class="chart-container"></div>
            </div>

            <!-- 教练绩效排行 -->
            <div class="chart-card">
                <div class="chart-title">🏆 教练人均带课效率排行（Top10）</div>
                <div class="top-members" id="coachRankingList"></div>
            </div>

            <!-- 各门店教练排行 -->
            <div class="chart-card wide">
                <div class="chart-title">🏪 各门店教练绩效详情</div>
                <div class="store-coach-grid" id="storeCoachGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // 分析数据（由Python注入 - 按照速查表 STORES_DATA 格式）
        window.ANALYSIS_DATA = {{ANALYSIS_DATA}};

        // 显示生成时间
        document.getElementById('generateTime').textContent =
            new Date().toLocaleString('zh-CN');

        // 数据解析（按照速查表6.1节兼容协议）
        let _raw = window.ANALYSIS_DATA.result || {};
        let STORES_DATA = Array.isArray(_raw.stores)
            ? Object.fromEntries(_raw.stores.map(s => [s.id, s]))
            : _raw;

        const storeCoachStats = _raw.storeCoachStats || {};

        // 填充门店切换器
        const storeSwitcher = document.getElementById('storeSwitcher');
        Object.values(STORES_DATA).forEach(store => {
            const btn = document.createElement('button');
            btn.className = 'store-btn';
            btn.dataset.store = store.id;
            btn.textContent = store.name;
            storeSwitcher.appendChild(btn);
        });

        // 计算汇总数据
        function calculateSummary() {
            const stores = Object.values(STORES_DATA);
            return {
                totalLessons: stores.reduce((sum, s) => sum + s.consumption.lessons, 0),
                attendanceVolume: stores.reduce((sum, s) => sum + s.consumption.attendanceVolume, 0),
                humanEfficiency: (stores.reduce((sum, s) => sum + s.consumption.lessons, 0) /
                    Math.max(1, stores.reduce((sum, s) => sum + s.consumption.attendanceVolume, 0))).toFixed(2),
                salesAmount: stores.reduce((sum, s) => sum + (s.salesAmount || 0), 0),
                profitRate: stores.reduce((sum, s) => sum + (s.profitRate || 0), 0) / stores.length,
                salesRate: stores.reduce((sum, s) => sum + (s.salesRate || 0), 0) / stores.length,
                renewalRatio: stores.reduce((sum, s) => sum + (s.renewalConsumptionRatio || 0), 0) / stores.length,
                activeRate: stores.reduce((sum, s) => sum + (s.activeRate || 0), 0) / stores.length,
                // 扩展数据合并
                dailyTrend: {},
                weekdayDistribution: {},
                timeSlotDistribution: {},
                coaches: []
            };
        }

        // 渲染单个门店数据
        function renderStore(storeId) {
            let data;
            if (storeId === 'all') {
                data = calculateSummary();
            } else {
                data = STORES_DATA[storeId];
            }

            // 填充KPI
            document.getElementById('totalLessons').textContent =
                (data.totalLessons || data.consumption?.lessons || 0).toLocaleString();
            document.getElementById('attendanceVolume').textContent =
                (data.attendanceVolume || data.consumption?.attendanceVolume || 0).toLocaleString();
            document.getElementById('humanEfficiency').textContent =
                (data.humanEfficiency || 0).toFixed(2);
            document.getElementById('profitRate').textContent = (data.profitRate || 0).toFixed(1) + '%';
            document.getElementById('salesAmount').textContent =
                '¥' + (data.salesAmount || 0).toLocaleString();
            document.getElementById('salesRate').textContent = (data.salesRate || 0).toFixed(1) + '%';
            document.getElementById('renewalRatio').textContent = (data.renewalRatio || data.renewalConsumptionRatio || 0).toFixed(1) + '%';
            document.getElementById('activeRate').textContent = (data.activeRate || 0).toFixed(1) + '%';

            // 图表数据
            const ext = data.extended || {};

            // 耗课构成饼图
            const consChart = echarts.init(document.getElementById('consumptionChart'));
            consChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}节 ({d}%)' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: data.training || 0, name: '定制私教', itemStyle: { color: '#667eea' } },
                        { value: data.hotmassage || 0, name: '热玛吉', itemStyle: { color: '#f5576c' } },
                        { value: data.rotation || 0, name: '轮换', itemStyle: { color: '#43e97b' } },
                        { value: data.group || 0, name: '团课', itemStyle: { color: '#fee140' } }
                    ]
                }]
            });

            // 门店对比图
            const storeChart = echarts.init(document.getElementById('storeCompareChart'));
            const storeNames = Object.values(STORES_DATA).map(s => s.name);
            const storeLessons = Object.values(STORES_DATA).map(s => s.consumption.lessons);
            storeChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: storeNames },
                yAxis: { type: 'value', name: '耗课量' },
                series: [{
                    type: 'bar',
                    data: storeLessons,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }]
            });

            // 每日趋势
            const dailyChart = echarts.init(document.getElementById('dailyTrendChart'));
            const dailyTrend = ext.dailyTrend || {};
            const dates = Object.keys(dailyTrend).sort();
            dailyChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: dates },
                yAxis: { type: 'value', name: '耗课量' },
                series: [{
                    name: '耗课量', type: 'line', smooth: true,
                    data: dates.map(d => dailyTrend[d]),
                    lineStyle: { width: 3, color: '#667eea' },
                    itemStyle: { color: '#667eea' },
                    areaStyle: { color: 'rgba(102, 126, 234, 0.2)' }
                }]
            });

            // 星期分布
            const weekdayChart = echarts.init(document.getElementById('weekdayChart'));
            const weekDist = ext.weekdayDistribution || {};
            weekdayChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'] },
                yAxis: { type: 'value', name: '耗课量' },
                series: [{
                    type: 'bar',
                    data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'].map(w => weekDist[w] || 0),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }]
            });

            // 时段分布
            const timeChart = echarts.init(document.getElementById('timeSlotChart'));
            const timeDist = ext.timeSlotDistribution || {};
            timeChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c}节 ({d}%)' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: Object.keys(timeDist).map(name => ({
                        value: timeDist[name],
                        name: name,
                        itemStyle: {
                            color: name === '上午' ? '#91cc75' : name === '下午' ? '#fac858' : '#ee6666'
                        }
                    }))
                }]
            });

            // 教练排行
            const coachList = ext.coachPerformance || [];
            document.getElementById('coachRankingList').innerHTML = coachList.map((c, i) => `
                <div class="member-row">
                    <div>
                        <span class="member-name">${i + 1}. ${c.name}</span>
                        <span class="badge badge-active">人均 ${c.rate}</span>
                    </div>
                    <div class="member-stats">${c.students} 人 | ${c.sessions} 节</div>
                </div>
            `).join('');

            // 各门店教练分组展示
            document.getElementById('storeCoachGrid').innerHTML = Object.values(storeCoachStats).map(store => `
                <div class="store-coach-card">
                    <div class="store-coach-title">
                        ${store.name}
                        <span class="store-coach-meta">
                            ${store.total_coaches} 教练 | ${store.total_students} 会员 | ${store.total_sessions} 课时
                        </span>
                    </div>
                    ${store.coaches.map((c, i) => `
                        <div class="member-row" style="background: white; margin: 5px 0; border-radius: 4px;">
                            <div>
                                <span class="member-name" style="font-size: 13px;">${i + 1}. ${c.name}</span>
                                <span class="badge badge-active" style="font-size: 11px;">人均 ${c.rate}</span>
                            </div>
                            <div class="member-stats" style="font-size: 12px;">${c.students}人 | ${c.sessions}节</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            // 响应式
            window.addEventListener('resize', () => {
                consChart.resize();
                storeChart.resize();
                dailyChart.resize();
                weekdayChart.resize();
                timeChart.resize();
            });
        }

        // 门店切换事件
        document.querySelectorAll('.store-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderStore(e.target.dataset.store);
            });
        });

        // 初始渲染
        renderStore('all');
    </script>
</body>
</html>
