<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamBoard - 团队协作看板</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ========== 左侧导航 ========== */
.sidebar {
  width: 220px;
  background: #27272a;
  border-right: 1px solid rgba(255,255,255,0.06);
  padding: 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}

.logo {
  font-weight: 700;
  font-size: 18px;
  padding: 12px 16px;
  margin-bottom: 8px;
  color: #fafafa;
}

.nav-item {
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 14px;
  color: #a1a1aa;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.04);
  color: #fafafa;
}

.nav-item.active {
  background: rgba(59, 130, 246, 0.15);
  color: #60a5fa;
}

.nav-section {
  font-size: 11px;
  color: #71717a;
  padding: 16px 16px 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-project {
  padding: 8px 16px 8px 40px;
  font-size: 13px;
  color: #71717a;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}

.nav-project:hover {
  color: #e4e4e7;
  background: rgba(255,255,255,0.03);
}

.nav-project.active {
  color: #fafafa;
  background: rgba(255,255,255,0.05);
}

.new-project-btn {
  color: #52525b;
  font-size: 13px;
  margin-top: 4px;
}

.new-project-btn:hover {
  color: #60a5fa;
}

/* ========== 主区域 ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #f5f5f7;
  position: relative;
}

/* 顶部栏 */
.header {
  height: 56px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: #ffffff;
  flex-shrink: 0;
}

.breadcrumb {
  font-size: 14px;
  color: #71717a;
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb strong {
  color: #1d1d1f;
  font-weight: 500;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}

.btn-primary {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
}

.btn-secondary {
  background: #f4f4f5;
  color: #52525b;
}

.btn-secondary:hover {
  background: #e4e4e7;
}

.btn-danger {
  background: rgba(239, 68, 68, 0.1);
  color: #dc2626;
}

.btn-danger:hover {
  background: rgba(239, 68, 68, 0.15);
}

.online-status {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: #f4f4f5;
  border-radius: 6px;
  font-size: 12px;
  color: #52525b;
}

.online-dot {
  width: 6px;
  height: 6px;
  background: #22c55e;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ========== 看板区域 ========== */
.board {
  flex: 1;
  padding: 24px;
  display: flex;
  gap: 16px;
  overflow-x: auto;
  align-items: flex-start;
}

.column {
  min-width: 290px;
  max-width: 290px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}

.column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
}

.column-title {
  font-size: 13px;
  font-weight: 600;
  color: #52525b;
  display: flex;
  align-items: center;
  gap: 8px;
}

.column-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}

.column-dot.todo { background: #d4d4d8; }
.column-dot.progress { background: #3b82f6; }
.column-dot.review { background: #8b5cf6; }
.column-dot.done { background: #22c55e; }

.count {
  background: #e4e4e7;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  color: #52525b;
  font-weight: 600;
}

/* ========== 任务卡片 ========== */
.card {
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}

.card:hover {
  border-color: rgba(59, 130, 246, 0.25);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}

.card.sortable-ghost {
  opacity: 0.4;
  background: #e5e7eb;
  border: 2px dashed #9ca3af;
}

.card.sortable-chosen {
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  transform: scale(1.02);
}

.card.sortable-drag {
  opacity: 0.9;
  cursor: grabbing;
}

.card-title {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
  color: #1d1d1f;
  line-height: 1.4;
}

.card-desc {
  font-size: 12px;
  color: #71717a;
  margin-bottom: 12px;
  line-height: 1.5;
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.tag {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}

.tag.blue { background: rgba(59, 130, 246, 0.1); color: #1d4ed8; }
.tag.green { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
.tag.purple { background: rgba(139, 92, 246, 0.1); color: #7c3aed; }
.tag.orange { background: rgba(249, 115, 22, 0.1); color: #c2410c; }
.tag.red { background: rgba(239, 68, 68, 0.1); color: #dc2626; }

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.assignee {
  width: 24px;
  height: 24px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: white;
}

.date {
  font-size: 11px;
  color: #71717a;
}

.date.overdue {
  color: #dc2626;
  font-weight: 500;
}

.add-task-btn {
  padding: 10px 12px;
  text-align: center;
  color: #71717a;
  cursor: pointer;
  border-radius: 6px;
  font-size: 13px;
  transition: all 0.1s;
  background: rgba(255,255,255,0.5);
  border: 1px dashed rgba(0,0,0,0.08);
}

.add-task-btn:hover {
  background: #ffffff;
  border-color: rgba(59, 130, 246, 0.3);
  color: #3b82f6;
}

.add-column-btn {
  min-width: 290px;
  max-width: 290px;
  padding: 40px 20px;
  text-align: center;
  color: #71717a;
  cursor: pointer;
  border-radius: 8px;
  font-size: 14px;
  transition: all 0.15s;
  background: rgba(255,255,255,0.5);
  border: 1px dashed rgba(0,0,0,0.08);
  flex-shrink: 0;
}

.add-column-btn:hover {
  background: #ffffff;
  border-color: rgba(59, 130, 246, 0.3);
  color: #3b82f6;
}

/* ========== 右侧抽屉 ========== */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transition: all 0.2s;
}

.drawer-overlay.active {
  opacity: 1;
  visibility: visible;
}

.drawer {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: 420px;
  background: #ffffff;
  border-left: 1px solid rgba(0,0,0,0.06);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
}

.drawer-overlay.active + .drawer,
.drawer.active {
  transform: translateX(0);
}

.drawer-header {
  padding: 20px 24px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.drawer-title {
  font-size: 18px;
  font-weight: 700;
  color: #1d1d1f;
}

.drawer-close {
  width: 32px;
  height: 32px;
  border: none;
  background: #f4f4f5;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  color: #52525b;
  display: flex;
  align-items: center;
  justify-content: center;
}

.drawer-close:hover {
  background: #e4e4e7;
}

.drawer-body {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
}

.drawer-section {
  margin-bottom: 24px;
}

.drawer-label {
  font-size: 11px;
  color: #71717a;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.drawer-value {
  font-size: 14px;
  color: #3f3f46;
}

.drawer-input,
.drawer-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: all 0.15s;
}

.drawer-input:focus,
.drawer-textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.drawer-textarea {
  min-height: 100px;
  resize: vertical;
}

.drawer-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(0,0,0,0.06);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* 标签选择器 */
.tag-selector {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tag-option {
  padding: 5px 12px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  opacity: 0.6;
  transition: all 0.15s;
}

.tag-option.selected {
  opacity: 1;
  transform: scale(1.05);
}

.tag-option.blue { background: rgba(59, 130, 246, 0.1); color: #1d4ed8; }
.tag-option.green { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
.tag-option.purple { background: rgba(139, 92, 246, 0.1); color: #7c3aed; }
.tag-option.orange { background: rgba(249, 115, 22, 0.1); color: #c2410c; }
.tag-option.red { background: rgba(239, 68, 68, 0.1); color: #dc2626; }

/* ========== 评论区 ========== */
.comment {
  background: #f5f5f7;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}

.comment-author {
  font-size: 13px;
  font-weight: 600;
  color: #3b82f6;
  margin-bottom: 4px;
}

.comment-text {
  font-size: 13px;
  color: #52525b;
  line-height: 1.5;
}

.comment-time {
  font-size: 11px;
  color: #a1a1aa;
  margin-top: 6px;
}

.comment-input-wrap {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

/* ========== 页面容器 ========== */
.page-container {
  padding: 24px;
  overflow-y: auto;
  height: 100%;
}

.page-container.hidden {
  display: none;
}

.page-header {
  margin-bottom: 24px;
}

.page-header h2 {
  font-size: 20px;
  font-weight: 600;
  color: #1d1d1f;
}

/* ========== 操作历史 ========== */
.activity-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.activity-item {
  background: white;
  border-radius: 8px;
  padding: 14px 16px;
  border: 1px solid rgba(0,0,0,0.06);
  display: flex;
  gap: 12px;
}

.activity-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.activity-icon.create { background: rgba(34, 197, 94, 0.1); }
.activity-icon.update { background: rgba(59, 130, 246, 0.1); }
.activity-icon.delete { background: rgba(239, 68, 68, 0.1); }
.activity-icon.move { background: rgba(139, 92, 246, 0.1); }
.activity-icon.comment { background: rgba(249, 115, 22, 0.1); }

.activity-content {
  flex: 1;
}

.activity-text {
  font-size: 14px;
  color: #1d1d1f;
  margin-bottom: 4px;
}

.activity-meta {
  font-size: 12px;
  color: #71717a;
}

.comment-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}

.comment-input:focus {
  border-color: #3b82f6;
}

.comment-btn {
  padding: 8px 16px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}

/* ========== 仪表盘 ========== */
.dashboard-section {
  margin-bottom: 32px;
}

.section-title {
  font-size: 16px;
  font-weight: 600;
  color: #1d1d1f;
  margin-bottom: 16px;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.project-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.project-card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.2s;
}

.project-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  border-color: rgba(59, 130, 246, 0.2);
}

.project-card-icon {
  font-size: 28px;
  margin-bottom: 12px;
}

.project-card-name {
  font-size: 15px;
  font-weight: 600;
  color: #1d1d1f;
  margin-bottom: 8px;
}

.project-card-stats {
  display: flex;
  gap: 12px;
  font-size: 13px;
  color: #71717a;
}

.project-card-progress {
  margin-top: 12px;
  height: 4px;
  background: #e5e7eb;
  border-radius: 2px;
  overflow: hidden;
}

.project-card-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  border-radius: 2px;
  transition: width 0.3s;
}

.task-list {
  background: white;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.06);
  overflow: hidden;
}

.task-item {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.task-item:hover {
  background: #fafafa;
}

.task-item:last-child {
  border-bottom: none;
}

.task-item-check {
  width: 18px;
  height: 18px;
  border: 2px solid #d1d5db;
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.15s;
}

.task-item-check:hover {
  border-color: #3b82f6;
}

.task-item-content {
  flex: 1;
}

.task-item-title {
  font-size: 14px;
  color: #1d1d1f;
  font-weight: 500;
}

.task-item-project {
  font-size: 12px;
  color: #71717a;
  margin-top: 2px;
}

.quick-links {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.quick-link-item {
  background: white;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.quick-link-item:hover {
  border-color: rgba(59, 130, 246, 0.2);
  transform: translateY(-1px);
}

.quick-link-icon {
  font-size: 20px;
}

.quick-link-name {
  font-size: 13px;
  font-weight: 500;
  color: #1d1d1f;
}

.due-tasks {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}

.due-task-item {
  background: white;
  border-radius: 8px;
  padding: 14px 16px;
  border: 1px solid rgba(0,0,0,0.06);
  border-left: 3px solid #f59e0b;
}

.due-task-item.today {
  border-left-color: #ef4444;
}

.due-task-item.tomorrow {
  border-left-color: #f59e0b;
}

.due-task-item.later {
  border-left-color: #3b82f6;
}

.due-task-title {
  font-size: 14px;
  font-weight: 500;
  color: #1d1d1f;
  margin-bottom: 4px;
}

.due-task-date {
  font-size: 12px;
  color: #71717a;
}

.workbench-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.workbench-card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid rgba(0,0,0,0.06);
}

/* ========== 配置弹窗 ========== */
.setup-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.setup-box {
  width: 100%;
  max-width: 450px;
  background: white;
  border-radius: 12px;
  padding: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.setup-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}

.setup-subtitle {
  font-size: 14px;
  color: #71717a;
  margin-bottom: 24px;
  text-align: center;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #52525b;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: all 0.15s;
}

.form-input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.setup-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 8px;
}

.setup-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(59, 130, 246, 0.25);
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  background: rgba(59, 130, 246, 0.1);
  color: #1d4ed8;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}

/* 辅助 */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ========== 左侧导航 ========== -->
<aside class="sidebar">
  <div class="logo">🎯 TeamBoard</div>

  <div class="nav-item active" onclick="showPage('dashboard')">
    <span>📊</span>
    仪表盘
  </div>
  <div class="nav-item" onclick="showPage('board')">
    <span>📋</span>
    任务看板
  </div>
  <div class="nav-item" onclick="showPage('workbench')">
    <span>⚡</span>
    快捷工作台
  </div>
  <div class="nav-item" onclick="showPage('activity')">
    <span>📜</span>
    操作历史
  </div>

  <div class="nav-section">项目</div>
  <div id="projectList">
    <!-- 项目列表动态生成 -->
  </div>
  <div class="nav-project new-project-btn" onclick="createProject()">
    + 新建项目
  </div>
</aside>

<!-- ========== 主区域 ========== -->
<main class="main">
  <header class="header">
    <div class="breadcrumb">
      <span id="breadcrumbPath">仪表盘</span>
    </div>
    <div class="header-actions">
      <div class="online-status">
        <span class="online-dot"></span>
        <span id="currentUser">未登录</span>
      </div>
      <button class="btn btn-secondary" onclick="openSettings()">⚙️ 设置</button>
      <button class="btn btn-primary" onclick="openTaskModal()">+ 新建任务</button>
    </div>
  </header>

  <!-- ========== 仪表盘首页 ========== -->
  <div class="page-container" id="dashboardPage">
    <!-- 项目总览卡片 -->
    <div class="dashboard-section">
      <h3 class="section-title">📊 项目总览</h3>
      <div class="project-cards" id="projectCards">

      </div>
    </div>

    <div class="dashboard-grid">
      <!-- 我的待办 -->
      <div class="dashboard-section">
        <h3 class="section-title">📋 我的待办</h3>

      </div>

      <!-- 快捷工作台 -->
      <div class="dashboard-section">
        <h3 class="section-title">⚡ 快捷工作台</h3>
        <div class="quick-links" id="quickLinks">
          <!-- 快捷链接动态生成 -->
        </div>
        <button class="btn btn-secondary" style="margin-top: 16px; width: 100%;" onclick="openQuickLinkModal()">+ 添加快捷方式</button>
      </div>
    </div>

    <!-- 本周到期 -->
    <div class="dashboard-section" style="margin-top: 24px;">
      <h3 class="section-title">⏰ 本周到期</h3>
      <div class="due-tasks" id="dueTasks">
        <!-- 到期任务动态生成 -->
      </div>

  </div>

  <!-- 任务看板页面 -->
  <div class="page-container hidden" id="boardPage">

    <div class="page-header">
      <h2>⚡ 快捷工作台</h2>
      <button class="btn btn-primary" onclick="openQuickLinkModal()">+ 添加快捷方式</button>
    </div>
    <div class="workbench-grid" id="workbenchGrid">
      <!-- 工作台卡片动态生成 -->
    </div>
  </div>

  <!-- 操作历史页面 -->
  <div class="page-container hidden" id="activityPage">
    <div class="page-header">
      <h2>📜 操作历史</h2>
    </div>
    <div class="activity-list" id="activityList">
      <!-- 历史记录动态生成 -->
    </div>
  </div>
</main>

<!-- ========== 右侧抽屉 - 任务详情 ========== -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">任务详情</div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <!-- 动态内容 -->
  </div>
  <div class="drawer-footer" id="drawerFooter">
    <button class="btn btn-danger" id="deleteTaskBtn" onclick="deleteCurrentTask()">删除任务</button>
    <button class="btn btn-secondary" onclick="closeDrawer()">取消</button>
    <button class="btn btn-primary" onclick="saveTask()">保存</button>
  </div>
</div>

<!-- ========== 配置弹窗 ========== -->
<div class="setup-modal" id="setupModal">
  <div class="setup-box">
    <div class="setup-title">🔧 首次配置</div>
    <div class="setup-subtitle">配置 Supabase 连接和你的用户名</div>

    <div class="form-group">
      <label class="form-label">Supabase Project URL</label>
      <input type="text" class="form-input" id="setupUrl" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="form-group">
      <label class="form-label">Supabase Anon Key</label>
      <input type="text" class="form-input" id="setupKey" placeholder="很长一串 key">
    </div>
    <div class="form-group">
      <label class="form-label">你的名字</label>
      <input type="text" class="form-input" id="setupName" placeholder="用于标记任务创建者">
    </div>

    <button class="setup-btn" onclick="saveSetup()">开始使用</button>
  </div>
</div>

<script>
// ========== 全局变量 ==========
let sbClient = null;
let currentProjectId = null;
let currentTaskId = null;
let currentColumnId = null;
let currentUserName = null;
let columns = [];
let tasks = [];
let projects = [];
let selectedTags = [];

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', init);

async function init() {
  // 检查配置
  const config = localStorage.getItem('teamboard_config');
  if (!config) {
    document.getElementById('setupModal').classList.remove('hidden');
    return;
  }

  const { url, key, username } = JSON.parse(config);
  if (!url || !key) {
    document.getElementById('setupModal').classList.remove('hidden');
    return;
  }

  // 初始化 Supabase
  try {
    sbClient = window.supabase.createClient(url, key);
    currentUserName = username || '匿名用户';
    document.getElementById('currentUser').textContent = currentUserName;

    // 加载所有数据
    await loadAllData();

    // 如果没有项目，创建默认项目
    if (projects.length === 0) {
      await createDefaultProject();
      await loadAllData();
    }

    // 隐藏配置弹窗
    document.getElementById('setupModal').classList.add('hidden');

    // 启动实时订阅
    initRealtime();

    // 默认显示仪表盘
    showPage('dashboard');
  } catch (e) {
    console.error('初始化失败:', e);
    alert('连接 Supabase 失败，请检查配置');
    document.getElementById('setupModal').classList.remove('hidden');
  }
}

// ========== 配置相关 ==========
function saveSetup() {
  const url = document.getElementById('setupUrl').value.trim();
  const key = document.getElementById('setupKey').value.trim();
  const name = document.getElementById('setupName').value.trim() || '匿名用户';

  if (!url || !key) {
    alert('请填写完整配置');
    return;
  }

  localStorage.setItem('teamboard_config', JSON.stringify({ url, key, username: name }));
  window.location.reload();
}

function openSettings() {
  const config = JSON.parse(localStorage.getItem('teamboard_config') || '{}');
  document.getElementById('setupUrl').value = config.url || '';
  document.getElementById('setupKey').value = config.key || '';
  document.getElementById('setupName').value = config.username || '';
  document.getElementById('setupModal').classList.remove('hidden');
}

// ========== 项目相关 ==========
async function loadProjects() {
  try {
    const { data, error } = await sbClient
      .from('projects')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    projects = data || [];
    renderProjectList();
  } catch (e) {
    // 如果表不存在，尝试创建表结构（简化处理）
    console.log('加载项目失败，可能需要建表:', e);
    projects = [];
  }
}

function renderProjectList() {
  const container = document.getElementById('projectList');
  container.innerHTML = projects.map(p => `
    <div class="nav-project ${p.id === currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
      ${p.icon || '📁'} ${p.name}
    </div>
  `).join('');
}

async function selectProject(projectId) {
  currentProjectId = projectId;
  const project = projects.find(p => p.id === projectId);
  if (project) {
    document.getElementById('currentProjectName').textContent = project.name;
  }
  renderProjectList();
  await loadBoardData();
}

async function createProject() {
  const name = prompt('输入项目名称：', '新项目');
  if (!name) return;

  try {
    const { data, error } = await sbClient
      .from('projects')
      .insert([{ name, icon: '📁' }])
      .select();

    if (error) throw error;

    // 创建默认列
    const projectId = data[0].id;
    const defaultColumns = [
      { project_id: projectId, name: '待办', color: 'todo', order: 0 },
      { project_id: projectId, name: '进行中', color: 'progress', order: 1 },
      { project_id: projectId, name: '评审中', color: 'review', order: 2 },
      { project_id: projectId, name: '已完成', color: 'done', order: 3 },
    ];

    await sbClient.from('columns').insert(defaultColumns);

    await loadProjects();
    await selectProject(projectId);
  } catch (e) {
    console.error('创建项目失败:', e);
    alert('创建项目失败，请先在 Supabase 创建 projects 表');
  }
}

async function createDefaultProject() {
  try {
    const { data, error } = await sbClient
      .from('projects')
      .insert([{ name: '我的第一个项目', icon: '🔥' }])
      .select();

    if (error) throw error;

    const projectId = data[0].id;
    const defaultColumns = [
      { project_id: projectId, name: '待办', color: 'todo', order: 0 },
      { project_id: projectId, name: '进行中', color: 'progress', order: 1 },
      { project_id: projectId, name: '评审中', color: 'review', order: 2 },
      { project_id: projectId, name: '已完成', color: 'done', order: 3 },
    ];

    await sbClient.from('columns').insert(defaultColumns);

    await loadProjects();
    await selectProject(projectId);
  } catch (e) {
    console.error('创建默认项目失败:', e);
  }
}

// ========== 看板数据 ==========
async function loadBoardData() {
  try {
    // 加载所有列（用于仪表盘跨项目统计）
    const { data: allCols, error: allColErr } = await sbClient
      .from('columns')
      .select('*')
      .order('order', { ascending: true });

    if (allColErr) throw allColErr;
    columns = allCols || [];

    // 加载所有任务（用于仪表盘跨项目统计）
    const { data: allTasks, error: allTaskErr } = await sbClient
      .from('tasks')
      .select('*')
      .order('created_at', { ascending: false });

    if (allTaskErr) throw allTaskErr;
    tasks = allTasks || [];

    // 如果有当前选中项目，渲染看板
    if (currentProjectId) {
      renderBoard();
    }
  } catch (e) {
    console.error('加载看板数据失败:', e);
  }
}

// ========== 渲染看板 ==========
function renderBoard() {
  const container = document.getElementById('boardContainer');

  // 只渲染当前项目的列
  const projectColumns = columns.filter(c => c.project_id === currentProjectId);
  // 只使用当前项目的任务
  const projectTasks = tasks.filter(t => t.project_id === currentProjectId);

  let html = '';

  // 渲染每一列
  projectColumns.forEach(col => {
    const colTasks = projectTasks.filter(t => t.column_id === col.id);

    html += `
      <div class="column" data-column-id="${col.id}">
        <div class="column-header">
          <span class="column-title">
            <span class="column-dot ${col.color}"></span>
            ${col.name}
            <span class="count">${colTasks.length}</span>
          </span>
        </div>
        <div class="tasks-container" data-column-id="${col.id}">
          ${colTasks.map(task => renderTaskCard(task)).join('')}
        </div>
        <div class="add-task-btn" onclick="openTaskModal('${col.id}')">+ 添加任务</div>
      </div>
    `;
  });

  // 添加列按钮
  html += `<div class="add-column-btn" onclick="createColumn()">+ 新建列表</div>`;

  container.innerHTML = html;

  // 初始化拖拽
  initSortable();
}

function renderTaskCard(task) {
  const tagsHtml = (task.tags || []).map(tag => `<span class="tag ${tag}">${getTagName(tag)}</span>`).join('');

  const assigneeChar = task.assignee ? task.assignee.charAt(0).toUpperCase() : '?';

  return `
    <div class="card" data-task-id="${task.id}" onclick="openTaskDetail('${task.id}')">
      <div class="card-title">${task.title}</div>
      ${task.description ? `<div class="card-desc">${task.description}</div>` : ''}
      <div class="card-tags">${tagsHtml}</div>
      <div class="card-meta">
        ${task.due_date ? `<span class="date">${formatDate(task.due_date)}</span>` : '<span></span>'}
        ${task.assignee ? `<div class="assignee" title="${task.assignee}">${assigneeChar}</div>` : ''}
      </div>
    </div>
  `;
}

function getTagName(tag) {
  const names = {
    blue: '重要',
    green: '设计',
    purple: '后端',
    orange: '紧急',
    red: '高优'
  };
  return names[tag] || tag;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  date.setHours(0, 0, 0, 0);

  const diff = date - today;
  if (diff < 0) return '已逾期';
  if (diff === 0) return '今天';
  if (diff === 86400000) return '明天';
  return `${date.getMonth() + 1}月${date.getDate()}日`;
}

// ========== 列操作 ==========
async function createColumn() {
  const name = prompt('输入列表名称：', '新列表');
  if (!name) return;

  try {
    await sbClient.from('columns').insert([{
      project_id: currentProjectId,
      name,
      color: 'todo',
      order: columns.length
    }]);
    await loadBoardData();
  } catch (e) {
    console.error('创建列失败:', e);
  }
}

// ========== 任务操作 ==========
function openTaskModal(columnId = null) {
  currentTaskId = null;
  selectedTags = [];

  if (columnId) {
    currentColumnId = columnId;
  } else if (columns.length > 0) {
    currentColumnId = columns[0].id;
  } else {
    alert('请先创建看板列');
    return;
  }

  document.getElementById('drawerTitle').textContent = '新建任务';
  document.getElementById('deleteTaskBtn').style.display = 'none';

  document.getElementById('drawerBody').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-label">任务标题</div>
      <input type="text" class="drawer-input" id="taskTitle" placeholder="输入任务标题">
    </div>
    <div class="drawer-section">
      <div class="drawer-label">描述</div>
      <textarea class="drawer-textarea" id="taskDesc" placeholder="详细描述这个任务..."></textarea>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">标签</div>
      <div class="tag-selector" id="tagSelector">
        <div class="tag-option red" data-tag="red" onclick="toggleTag(this)">高优</div>
        <div class="tag-option blue" data-tag="blue" onclick="toggleTag(this)">重要</div>
        <div class="tag-option purple" data-tag="purple" onclick="toggleTag(this)">后端</div>
        <div class="tag-option orange" data-tag="orange" onclick="toggleTag(this)">紧急</div>
        <div class="tag-option green" data-tag="green" onclick="toggleTag(this)">设计</div>
      </div>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">负责人</div>
      <input type="text" class="drawer-input" id="taskAssignee" placeholder="如：张三" value="${currentUserName}">
    </div>
    <div class="drawer-section">
      <div class="drawer-label">截止日期</div>
      <input type="date" class="drawer-input" id="taskDueDate">
    </div>
  `;

  document.getElementById('drawerOverlay').classList.add('active');
  document.getElementById('drawer').classList.add('active');

  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function openTaskDetail(taskId) {
  currentTaskId = taskId;
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  selectedTags = task.tags || [];

  document.getElementById('drawerTitle').textContent = '编辑任务';
  document.getElementById('deleteTaskBtn').style.display = 'block';

  const tagsHtml = ['red', 'blue', 'purple', 'orange', 'green'].map(tag => `
    <div class="tag-option ${tag} ${selectedTags.includes(tag) ? 'selected' : ''}" data-tag="${tag}" onclick="toggleTag(this)">${getTagName(tag)}</div>
  `).join('');

  document.getElementById('drawerBody').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-label">任务标题</div>
      <input type="text" class="drawer-input" id="taskTitle" value="${task.title}">
    </div>
    <div class="drawer-section">
      <div class="drawer-label">描述</div>
      <textarea class="drawer-textarea" id="taskDesc" placeholder="详细描述这个任务...">${task.description || ''}</textarea>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">标签</div>
      <div class="tag-selector" id="tagSelector">${tagsHtml}</div>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">负责人</div>
      <input type="text" class="drawer-input" id="taskAssignee" value="${task.assignee || ''}">
    </div>
    <div class="drawer-section">
      <div class="drawer-label">截止日期</div>
      <input type="date" class="drawer-input" id="taskDueDate" value="${task.due_date ? task.due_date.split('T')[0] : ''}">
    </div>
    <div class="drawer-section">
      <div class="drawer-label">创建者</div>
      <div class="drawer-value">${task.created_by || '未知'}</div>
    </div>
    <div class="drawer-section">
      <div class="drawer-label">评论</div>
      <div id="commentsList"></div>
      <div style="margin-top: 12px; display: flex; gap: 8px;">
        <input type="text" class="drawer-input" id="newComment" placeholder="添加评论..." style="flex: 1;">
        <button class="btn-primary" onclick="addComment()" style="margin: 0;">发送</button>
      </div>
    </div>
  `;

  document.getElementById('drawerOverlay').classList.add('active');
  document.getElementById('drawer').classList.add('active');

  // 加载评论
  loadComments();
}

function toggleTag(el) {
  const tag = el.dataset.tag;
  el.classList.toggle('selected');

  if (selectedTags.includes(tag)) {
    selectedTags = selectedTags.filter(t => t !== tag);
  } else {
    selectedTags.push(tag);
  }
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('active');
  document.getElementById('drawer').classList.remove('active');
}

async function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) {
    alert('请输入任务标题');
    return;
  }

  const data = {
    title,
    description: document.getElementById('taskDesc').value.trim(),
    assignee: document.getElementById('taskAssignee').value.trim(),
    due_date: document.getElementById('taskDueDate').value || null,
    tags: selectedTags.length > 0 ? selectedTags : null,
    updated_by: currentUserName
  };

  try {
    if (currentTaskId) {
      // 更新
      await sbClient.from('tasks').update(data).eq('id', currentTaskId);
      logActivity('update', `更新了任务 "${title}"`, currentTaskId);
    } else {
      // 新建
      data.project_id = currentProjectId;
      data.column_id = currentColumnId;
      data.created_by = currentUserName;
      await sbClient.from('tasks').insert([data]);
      logActivity('create', `创建了任务 "${title}"`);
    }

    closeDrawer();
    await loadBoardData();
  } catch (e) {
    console.error('保存任务失败:', e);
    alert('保存失败，请检查数据库表结构');
  }
}

async function deleteCurrentTask() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!confirm('确定删除这个任务吗？')) return;

  try {
    await sbClient.from('tasks').delete().eq('id', currentTaskId);
    logActivity('delete', `删除了任务 "${task?.title || '未知'}"`);
    closeDrawer();
    await loadBoardData();
  } catch (e) {
    console.error('删除失败:', e);
  }
}

// ========== 评论功能 ==========
async function loadComments() {
  if (!currentTaskId) return;

  try {
    const { data, error } = await sbClient
      .from('comments')
      .select('*')
      .eq('task_id', currentTaskId)
      .order('created_at', { ascending: true });

    if (error) throw error;

    const container = document.getElementById('commentsList');
    if (container && data && data.length > 0) {
      container.innerHTML = data.map(c => `
        <div class="comment">
          <div class="comment-author">${c.author}</div>
          <div class="comment-text">${c.content}</div>
        </div>
      `).join('');
    } else if (container) {
      container.innerHTML = '<div style="color: #a1a1aa; font-size: 12px; padding: 12px; text-align: center;">暂无评论</div>';
    }
  } catch (e) {
    console.error('加载评论失败:', e);
  }
}

async function addComment() {
  const input = document.getElementById('newComment');
  const content = input.value.trim();
  if (!content || !currentTaskId) return;

  try {
    await sbClient.from('comments').insert([{
      task_id: currentTaskId,
      content,
      author: currentUserName
    }]);

    input.value = '';
    await loadComments();
    logActivity('comment', `评论了任务`, currentTaskId);
  } catch (e) {
    console.error('添加评论失败:', e);
    alert('添加评论失败，请先在 Supabase 执行最新的 setup.sql 创建 comments 表');
  }
}

// ========== 拖拽排序 ==========
let sortableInstances = [];

function initSortable() {
  // 先销毁旧实例
  sortableInstances.forEach(s => s.destroy());
  sortableInstances = [];

  const containers = document.querySelectorAll('.tasks-container');
  containers.forEach(container => {
    const sortable = new Sortable(container, {
      group: 'tasks',
      animation: 200,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onEnd: async function(evt) {
        const taskId = evt.item.dataset.taskId;
        const newColumnId = evt.to.dataset.columnId;
        const newOrder = evt.newIndex;
        const task = tasks.find(t => t.id === taskId);
        const newColumn = columns.find(c => c.id === newColumnId);

        // 更新数据库
        try {
          await sbClient.from('tasks').update({
            column_id: newColumnId,
            "order": newOrder,
            updated_by: currentUserName
          }).eq('id', taskId);

          // 记录操作历史
          if (task && newColumn) {
            logActivity('move', `将任务 "${task.title}" 移动到 "${newColumn.name}"`, taskId);
          }

          // 重新加载以同步所有客户端
          await loadBoardData();
        } catch (e) {
          console.error('更新排序失败:', e);
        }
      }
    });
    sortableInstances.push(sortable);
  });
}

// ========== 实时同步 ==========
let realtimeChannel = null;

function initRealtime() {
  if (!sbClient) return;

  // 先清理旧订阅
  if (realtimeChannel) {
    sbClient.removeChannel(realtimeChannel);
  }

  // 订阅任务变更
  realtimeChannel = sbClient
    .channel('teamboard-realtime')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'tasks' },
      async (payload) => {
        console.log('任务变更:', payload);
        await loadAllData();
        // 如果在仪表盘，刷新仪表盘
        const dashboardPage = document.getElementById('dashboardPage');
        if (!dashboardPage.classList.contains('hidden')) {
          renderDashboard();
        }
      }
    )
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'comments' },
      (payload) => {
        console.log('评论变更:', payload);
        loadComments();
      }
    )
    .subscribe();
}

// ========== 页面切换 ==========
// ========== 快捷链接数据 ==========
let quickLinks = JSON.parse(localStorage.getItem('teamboard_quicklinks') || '[]');

// ========== 数据源插件架构（预留对接位） ==========
// ========== 数据源插件系统 ==========
// 外部来源的任务，统一格式后显示在"我的待办"里
let externalTasks = JSON.parse(localStorage.getItem('teamboard_external_tasks') || '[]');

// 数据源配置
const dataSources = {
  // 数据源1：Wiki 笔记
  wiki: {
    name: '我的 Wiki',
    icon: '📚',
    fetch: async () => externalTasks.filter(t => t.source === 'wiki' || t.source_file),
  },

  // 数据源2：Get 笔记（预留，等有 API 了再写）
  getNote: {
    name: 'Get 笔记',
    icon: '📝',
    fetch: async () => [],
  },

  // 数据源3：GitHub Issues（预留）
  github: {
    name: 'GitHub',
    icon: '🐙',
    fetch: async () => [],
  },
};

// 拉取所有数据源
async function fetchAllDataSources() {
  const all = [];
  for (const [key, source] of Object.entries(dataSources)) {
    try {
      const items = await source.fetch();
      items.forEach(item => {
        all.push({
          ...item,
          id: `ext_${key}_${item.id}`,
          source: key,
          sourceName: source.name,
          sourceIcon: source.icon,
          isExternal: true,
        });
      });
    } catch (e) {
      console.error(`数据源 ${key} 拉取失败:`, e);
    }
  }
  return all;
}

// 打开导入弹窗
function openImportModal() {
  const json = prompt('粘贴 JSON 格式的待办列表：\n\n格式示例：\n[{"id":"1","title":"任务标题","due_date":"2024-05-10"}]');
  if (!json) return;

  try {
    const data = JSON.parse(json);
    externalTasks = [...externalTasks, ...data];
    localStorage.setItem('teamboard_external_tasks', JSON.stringify(externalTasks));
    renderDashboard();
    alert(`✅ 成功导入 ${data.length} 条任务！`);
  } catch (e) {
    alert('JSON 格式错误！');
  }
}

// 清除外部任务
function clearExternalTasks() {
  if (!confirm('确定清空所有外部导入的任务吗？')) return;
  externalTasks = [];
  localStorage.removeItem('teamboard_external_tasks');
  renderDashboard();
}

// ========== 页面切换 ==========
function showPage(page) {
  // 更新导航状态
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.remove('active');
    if (item.onclick.toString().includes(page)) {
      item.classList.add('active');
    }
  });

  // 面包屑导航
  const breadcrumbNames = {
    dashboard: '仪表盘',
    board: '任务看板',
    workbench: '快捷工作台',
    activity: '操作历史'
  };
  document.getElementById('breadcrumbPath').textContent = breadcrumbNames[page] || page;

  // 隐藏所有页面
  document.querySelectorAll('.page-container, .board').forEach(el => {
    el.classList.add('hidden');
  });

  // 显示目标页面
  if (page === 'dashboard') {
    document.getElementById('dashboardPage').classList.remove('hidden');
    renderDashboard();
  } else if (page === 'board') {
    document.getElementById('boardPage').classList.remove('hidden');
    document.getElementById('boardContainer').classList.remove('hidden');
  } else if (page === 'workbench') {
    document.getElementById('workbenchPage').classList.remove('hidden');
    renderWorkbench();
  } else if (page === 'activity') {
    document.getElementById('activityPage').classList.remove('hidden');
    loadActivity();
  } else {
    alert('功能开发中...');
  }
}

// ========== 仪表盘渲染 ==========
async function renderDashboard() {
  // 1. 渲染项目卡片
  renderProjectCards();

  // 2. 渲染我的待办
  await renderMyTasks();

  // 3. 渲染快捷链接
  renderQuickLinks();

  // 4. 渲染本周到期
  renderDueTasks();

  // 5. 拉取外部数据源（预留）
  const externalData = await fetchAllDataSource();
  console.log('外部数据源:', externalData);
}

function renderProjectCards() {
  const container = document.getElementById('projectCards');

  container.innerHTML = projects.map(project => {
    const projectTasks = tasks.filter(t => t.project_id === project.id);
    const total = projectTasks.length;
    const done = projectTasks.filter(t => {
      const col = columns.find(c => c.id === t.column_id);
      return col && col.name.includes('完成');
    }).length;
    const progress = total > 0 ? Math.round((done / total) * 100) : 0;

    return `
      <div class="project-card" onclick="selectProject('${project.id}')">
        <div class="project-card-icon">${project.icon || '📁'}</div>
        <div class="project-card-name">${project.name}</div>
        <div class="project-card-stats">
          <span>✅ ${done}/${total}</span>
          <span>📝 ${total - done} 待办</span>
        </div>
        <div class="project-card-progress">
          <div class="project-card-progress-bar" style="width: ${progress}%"></div>
        </div>
      </div>
    `;
  }).join('');

  if (projects.length === 0) {
    container.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; color: #a1a1aa; padding: 40px;">
        暂无项目，点击左侧"新建项目"开始
      </div>
    `;
  }
}

async function renderMyTasks() {
  const container = document.getElementById('myTasks');

  // 拉取外部数据源
  const externalData = await fetchAllDataSources();

  // 合并：本地任务 + 外部任务
  const myLocalTasks = tasks.filter(t => t.assignee === currentUserName);
  const allTasks = [
    ...myLocalTasks.map(t => ({ ...t, source: 'teamboard', sourceName: '本地', sourceIcon: '📋' })),
    ...externalData
  ];

  if (allTasks.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; color: #a1a1aa; padding: 30px 20px 10px;">
        暂无待办任务
      </div>
      <div style="text-align: center; padding-bottom: 20px;">
        <button onclick="openImportModal()" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer;">
          📥 导入外部待办
        </button>
        <button onclick="clearExternalTasks()" style="margin-left: 8px; padding: 8px 16px; background: #f3f4f6; color: #374151; border: none; border-radius: 6px; cursor: pointer;">
          清空外部
        </button>
      </div>
    `;
    return;
  }

  container.innerHTML = allTasks.map(task => {
    const project = projects.find(p => p.id === task.project_id);
    const isExternal = task.isExternal;

    return `
      <div class="task-item" ${isExternal ? '' : `onclick="openTaskDetail('${task.id}')"`}>
        <div class="task-item-check" ${isExternal ? 'style="opacity: 0.3"' : `onclick="event.stopPropagation(); quickCompleteTask('${task.id}')"`}></div>
        <div class="task-item-content">
          <div class="task-item-title">
            ${task.sourceIcon} ${task.title}
          </div>
          <div class="task-item-project" style="display: flex; justify-content: space-between;">
            <span>${project?.name || task.sourceName || '未知来源'}</span>
            ${isExternal ? '<span style="color: #3b82f6; font-size: 11px;">外部</span>' : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');

  // 底部加导入按钮
  container.innerHTML += `
    <div style="padding: 12px; text-align: center; border-top: 1px solid #f3f4f6;">
      <button onclick="openImportModal()" style="font-size: 12px; padding: 6px 12px; background: #f3f4f6; color: #374151; border: none; border-radius: 6px; cursor: pointer;">
        📥 导入外部待办
      </button>
      ${externalData.length > 0 ? `
        <button onclick="clearExternalTasks()" style="margin-left: 8px; font-size: 12px; padding: 6px 12px; background: #fef2f2; color: #dc2626; border: none; border-radius: 6px; cursor: pointer;">
          清空外部 (${externalData.length})
        </button>
      ` : ''}
    </div>
  `;
}

function renderQuickLinks() {
  const container = document.getElementById('quickLinks');

  if (quickLinks.length === 0) {
    // 默认快捷链接
    const defaults = [
      { name: 'GitHub', icon: '🐙', url: 'https://github.com' },
      { name: 'Figma', icon: '🎨', url: 'https://figma.com' },
      { name: 'Supabase', icon: '🗄️', url: 'https://supabase.com' },
      { name: 'Vercel', icon: '▲', url: 'https://vercel.com' },
    ];
    quickLinks = defaults;
  }

  container.innerHTML = quickLinks.map(link => `
    <div class="quick-link-item" onclick="window.open('${link.url}', '_blank')">
      <span class="quick-link-icon">${link.icon}</span>
      <span class="quick-link-name">${link.name}</span>
    </div>
  `).join('');
}

function renderDueTasks() {
  const container = document.getElementById('dueTasks');
  const now = new Date();
  const weekEnd = new Date(now.getTime() + 7 * 86400000);

  // 筛选本周到期的任务
  const dueTasks = tasks.filter(t => {
    if (!t.due_date) return false;
    const due = new Date(t.due_date);
    return due >= now && due <= weekEnd;
  });

  if (dueTasks.length === 0) {
    container.innerHTML = `
      <div style="grid-column: 1/-1; text-align: center; color: #a1a1aa; padding: 40px;">
        🎉 本周没有即将到期的任务
      </div>
    `;
    return;
  }

  container.innerHTML = dueTasks.map(task => {
    const dueDate = new Date(task.due_date);
    const daysLeft = Math.ceil((dueDate - now) / 86400000);
    let timeClass = 'later';
    let timeText = `${daysLeft} 天后`;

    if (daysLeft <= 0) {
      timeClass = 'today';
      timeText = '今天到期 ⚠️';
    } else if (daysLeft === 1) {
      timeClass = 'tomorrow';
      timeText = '明天到期';
    }

    const project = projects.find(p => p.id === task.project_id);

    return `
      <div class="due-task-item ${timeClass}" onclick="openTaskDetail('${task.id}')">
        <div class="due-task-title">${task.title}</div>
        <div class="due-task-date">${project?.name || '未知项目'} · ${timeText}</div>
      </div>
    `;
  }).join('');
}

async function quickCompleteTask(taskId) {
  // 快速完成任务（直接移动到"已完成"列）
  try {
    const doneColumn = columns.find(c => c.name.includes('完成'));
    if (doneColumn) {
      await sbClient.from('tasks').update({
        column_id: doneColumn.id
      }).eq('id', taskId);

      logActivity('update', `完成了任务`, taskId);
      await loadAllData();
      renderDashboard();
    } else {
      alert('请先创建"已完成"列');
    }
  } catch (e) {
    console.error('快速完成失败:', e);
  }
}

// ========== 快捷工作台 ==========
function renderWorkbench() {
  const container = document.getElementById('workbenchGrid');
  // 以后可以扩展更多工作台功能
  container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #a1a1aa; padding: 60px;">🚀 工作台功能开发中...</div>';
}

function openQuickLinkModal() {
  alert('快捷链接管理功能开发中...');
}

// ========== 项目选择 ==========
async function selectProject(projectId) {
  currentProjectId = projectId;
  const project = projects.find(p => p.id === projectId);
  if (project) {
    document.getElementById('breadcrumbPath').textContent = `项目 / ${project.name}`;
  }
  renderProjectList();

  // 切换到看板页面
  showPage('board');
  await loadBoardData();
}

// ========== 加载所有数据 ==========
async function loadAllData() {
  await loadProjects();
  if (projects.length > 0 && !currentProjectId) {
    currentProjectId = projects[0].id;
  }
  await loadBoardData();
}

// ========== 操作历史记录 ==========
async function logActivity(action, content, taskId = null) {
  if (!sbClient || !currentProjectId) return;

  try {
    await sbClient.from('activity_log').insert([{
      project_id: currentProjectId,
      task_id: taskId,
      action,
      content,
      author: currentUserName
    }]);
  } catch (e) {
    console.error('记录操作失败:', e);
  }
}

async function loadActivity() {
  if (!sbClient || !currentProjectId) return;

  try {
    const { data, error } = await sbClient
      .from('activity_log')
      .select('*')
      .eq('project_id', currentProjectId)
      .order('created_at', { ascending: false })
      .limit(50);

    if (error) throw error;

    const container = document.getElementById('activityList');
    const icons = {
      create: '➕',
      update: '✏️',
      delete: '🗑️',
      move: '➡️',
      comment: '💬'
    };

    container.innerHTML = (data || []).map(item => `
      <div class="activity-item">
        <div class="activity-icon ${item.action}">${icons[item.action] || '📌'}</div>
        <div class="activity-content">
          <div class="activity-text">${item.author} ${item.content}</div>
          <div class="activity-meta">${formatActivityTime(item.created_at)}</div>
        </div>
      </div>
    `).join('');

    if (!data || data.length === 0) {
      container.innerHTML = '<div style="text-align: center; color: #a1a1aa; padding: 40px;">暂无操作记录</div>';
    }
  } catch (e) {
    console.error('加载操作历史失败:', e);
    const container = document.getElementById('activityList');
    container.innerHTML = '<div style="text-align: center; color: #a1a1aa; padding: 40px;">请先在 Supabase 执行最新的 setup.sql 创建 activity_log 表</div>';
  }
}

function formatActivityTime(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;

  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDrawer();
